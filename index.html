<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Solvera</title>
<style>
  :root{
    --bg: #05070a;
    --panel: rgba(255,255,255,0.055);
    --panel-strong: rgba(255,255,255,0.075);
    --line: rgba(255,255,255,0.08);
    --text: rgba(255,255,255,0.96);
    --muted: rgba(255,255,255,0.52);
    --blue: #2da8ff;
    --blue2: #6a5cff;
    --shadow: 0 20px 80px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(circle at 50% 20%, rgba(45,168,255,0.10), transparent 30%),
      radial-gradient(circle at 50% 85%, rgba(106,92,255,0.08), transparent 28%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
    overflow: hidden;
  }

  body::before{
    content:"";
    position: fixed;
    inset: 0;
    background:
      linear-gradient(to bottom, rgba(255,255,255,0.03), transparent 18%),
      radial-gradient(circle at 50% 25%, rgba(45,168,255,0.10), transparent 18%),
      radial-gradient(circle at 50% 32%, rgba(45,168,255,0.05), transparent 38%);
    pointer-events: none;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    padding-top: calc(env(safe-area-inset-top) + 12px);
    padding-left: 18px;
    padding-right: 18px;
    padding-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    flex: 1;
    text-align: center;
    transform: translateX(-8px);
  }

  .brand-title {
    font-size: 20px;
    letter-spacing: 0.42em;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    text-indent: 0.42em;
  }

  .presence {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 14px;
  }

  .presence-ring {
    width: 10px;
    height: 10px;
    border-radius: 999px;
    background: #20d46b;
    box-shadow: 0 0 12px rgba(32,212,107,0.85);
    animation: pulseDot 3.8s ease-in-out infinite;
  }

  .presence-ring[data-mode="agent"] {
    background: #8b5cf6;
    box-shadow: 0 0 16px rgba(139,92,246,0.9);
  }

  .presence-ring[data-mode="analysis"] {
    background: #38bdf8;
    box-shadow: 0 0 16px rgba(56,189,248,0.9);
  }

  .presence-ring[data-mode="error"] {
    background: #ef4444;
    box-shadow: 0 0 16px rgba(239,68,68,0.9);
  }

  @keyframes pulseDot {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  .icon-btn {
    width: 38px;
    height: 38px;
    border: 0;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.82);
    display: grid;
    place-items: center;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  .feed {
    position: relative;
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 10px 14px 168px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overscroll-behavior: contain;
  }

  .feed::-webkit-scrollbar { width: 0; height: 0; }

  .message-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    max-width: 100%;
  }

  .message-row.bot {
    justify-content: flex-start;
  }

  .message-row.user {
    justify-content: flex-end;
  }

  .mini-mark {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex: 0 0 auto;
    border: 1px solid rgba(45,168,255,0.25);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 0 10px rgba(45,168,255,0.16);
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.28), rgba(45,168,255,0.92));
    margin-bottom: 11px;
  }

  .bubble {
    max-width: min(80vw, 560px);
    border-radius: 18px;
    padding: 12px 14px;
    line-height: 1.42;
    letter-spacing: 0.01em;
    position: relative;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: var(--shadow);
    word-wrap: break-word;
    overflow-wrap: anywhere;
    white-space: pre-wrap;
  }

  .bubble::after {
    content: "";
    position: absolute;
    bottom: 0;
    width: 12px;
    height: 12px;
    background: inherit;
    filter: brightness(0.98);
  }

  .bubble.bot {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.070), rgba(255,255,255,0.040));
    border: 1px solid rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.94);
    border-top-left-radius: 8px;
  }

  .bubble.bot::after {
    left: -4px;
    clip-path: polygon(100% 0, 0 0, 100% 100%);
    border-bottom-left-radius: 4px;
  }

  .bubble.user {
    background: linear-gradient(135deg, rgba(45,168,255,0.96), rgba(106,92,255,0.86));
    color: white;
    border: 1px solid rgba(255,255,255,0.08);
    border-top-right-radius: 8px;
  }

  .bubble.user::after {
    right: -4px;
    clip-path: polygon(0 0, 0 100%, 100% 0);
    border-bottom-right-radius: 4px;
  }

  .name {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(78, 178, 255, 0.95);
    margin-bottom: 5px;
    font-weight: 600;
  }

  .assistant-block {
    display: flex;
    flex-direction: column;
    gap: 3px;
    max-width: 100%;
  }

  .typing {
    display: inline-flex;
    gap: 5px;
    align-items: center;
    min-height: 18px;
  }

  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(78, 178, 255, 0.95);
    animation: pulse 1.1s infinite ease-in-out;
  }

  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.30s; }

  @keyframes pulse {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
    40% { transform: translateY(-3px); opacity: 1; }
  }

  .card {
    margin-top: 4px;
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(255,255,255,0.072), rgba(255,255,255,0.045));
    border: 1px solid rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .card-inner {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    padding: 14px;
  }

  .card-copy {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-top: 2px;
  }

  .card-kicker {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(78, 178, 255, 0.95);
    font-weight: 700;
  }

  .card-title {
    font-size: 15px;
    color: rgba(255,255,255,0.96);
    line-height: 1.5;
  }

  .card-body {
    font-size: 13px;
    line-height: 1.55;
    color: rgba(255,255,255,0.72);
  }

  .terminal-box {
    margin: 0 14px 14px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.36);
    overflow: hidden;
  }

  .terminal-head {
    padding: 10px 12px;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(120, 140, 255, 0.96);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .terminal-log {
    margin: 0;
    padding: 12px;
    color: rgba(230,230,255,0.92);
    font-size: 12px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  }

  .progress-wrap {
    display:flex;
    align-items:center;
    gap: 12px;
    padding: 0 14px 14px;
  }

  .progress-bar {
    flex: 1;
    height: 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
  }

  .progress-bar span {
    display:block;
    height:100%;
    width: 0%;
    border-radius: 999px;
    background: linear-gradient(90deg, rgba(45,168,255,0.95), rgba(106,92,255,0.95));
    box-shadow: 0 0 18px rgba(106,92,255,0.35);
    transition: width 0.2s ease;
  }

  .progress-label {
    flex: 0 0 auto;
    min-width: 44px;
    text-align: right;
    color: rgba(255,255,255,0.72);
    font-size: 12px;
  }

  .file-strip {
    display:flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 0 14px 14px;
  }

  .file-chip, .action {
    border: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.86);
    border-radius: 14px;
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1;
  }

  .card-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 0 14px 14px;
  }

  .composer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 12px 12px calc(env(safe-area-inset-bottom) + 12px);
    background: linear-gradient(to top, rgba(5,7,10,0.95), rgba(5,7,10,0.82), rgba(5,7,10,0.0));
    z-index: 50;
  }

  .composer-shell {
    border-radius: 22px;
    padding: 12px;
    background: rgba(255,255,255,0.045);
    border: 1px solid rgba(78, 178, 255, 0.20);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 0 24px rgba(45,168,255,0.10),
      0 0 70px rgba(45,168,255,0.04);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
  }

  .composer-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .plus-btn, .send-btn, .mic-btn {
    flex: 0 0 auto;
    width: 48px;
    height: 48px;
    border: 0;
    border-radius: 16px;
    display: grid;
    place-items: center;
    color: rgba(255,255,255,0.88);
  }

  .plus-btn, .mic-btn {
    background: rgba(255,255,255,0.05);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  .send-btn {
    background: linear-gradient(135deg, rgba(45,168,255,0.98), rgba(106,92,255,0.92));
    box-shadow: 0 0 24px rgba(45,168,255,0.26);
  }

  .input-wrap {
    flex: 1;
    min-width: 0;
    height: 48px;
    display: flex;
    align-items: center;
    border-radius: 16px;
    background: rgba(0,0,0,0.16);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
  }

  .input-wrap input {
    width: 100%;
    border: 0;
    outline: none;
    background: transparent;
    color: var(--text);
    font-size: 16px;
    padding: 0 14px;
  }

  .input-wrap input::placeholder {
    color: rgba(255,255,255,0.35);
  }

  .command-strip {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }

  .command-strip::-webkit-scrollbar { display: none; }

  .chip {
    flex: 0 0 auto;
    padding: 9px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.82);
    font-size: 13px;
  }

  .chip strong {
    color: rgba(78, 178, 255, 0.98);
    font-weight: 700;
  }

  .status-row {
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: rgba(255,255,255,0.40);
    font-size: 12px;
    padding: 0 4px;
  }

  .status-pulse {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .status-pulse .live {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #20d46b;
    box-shadow: 0 0 12px rgba(32,212,107,0.85);
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.34);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    z-index: 100;
    display: none;
  }

  .overlay.open {
    display: block;
  }

  .panel {
    position: absolute;
    top: 0;
    bottom: 0;
    width: min(84vw, 340px);
    background: rgba(10,12,16,0.96);
    border-right: 1px solid rgba(255,255,255,0.08);
    box-shadow: 20px 0 60px rgba(0,0,0,0.35);
    padding: 18px;
    overflow-y: auto;
  }

  .panel.right {
    right: 0;
    left: auto;
    border-right: 0;
    border-left: 1px solid rgba(255,255,255,0.08);
    box-shadow: -20px 0 60px rgba(0,0,0,0.35);
  }

  .panel h3 {
    margin: 0 0 14px;
    font-size: 14px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(78, 178, 255, 0.95);
  }

  .panel-item {
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.9);
    font-size: 14px;
    cursor: pointer;
  }

  .toggle-row {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .switch {
    width: 46px;
    height: 28px;
    border-radius: 999px;
    background: rgba(255,255,255,0.10);
    position: relative;
    flex: 0 0 auto;
  }

  .switch.on {
    background: rgba(45,168,255,0.45);
  }

  .switch::after {
    content:"";
    position:absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: white;
    transition: transform .18s ease;
  }

  .switch.on::after {
    transform: translateX(18px);
  }

  .file-modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    z-index: 120;
    padding: 18px;
  }

  .file-modal.open {
    display: grid;
    place-items: center;
  }

  .file-modal-card {
    width: min(92vw, 720px);
    max-height: 86vh;
    overflow: auto;
    background: rgba(10,12,16,0.98);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.45);
  }

  .file-modal-head {
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .file-modal-title {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(78, 178, 255, 0.95);
  }

  .file-modal-body {
    padding: 16px;
    color: rgba(240,240,255,0.94);
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  }

  .hidden {
    display: none !important;
  }

  @media (max-width: 420px){
    .brand-title { font-size: 18px; letter-spacing: 0.36em; }
    .bubble { max-width: 84vw; }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button class="icon-btn" id="menuBtn" aria-label="Menu">☰</button>

      <div class="brand">
        <div class="brand-title">SOLVERA</div>
        <div class="presence"><span class="presence-ring" id="presenceRing" data-mode="idle"></span></div>
      </div>

      <button class="icon-btn" id="settingsBtn" aria-label="Instellingen">⚙</button>
    </div>

    <div id="feed" class="feed" aria-live="polite"></div>

    <div class="composer">
      <div class="composer-shell">
        <div class="composer-row">
          <button class="plus-btn" id="plusBtn" aria-label="Acties">+</button>
          <div class="input-wrap">
            <input
              id="input"
              type="text"
              placeholder="Bericht Solvera..."
              autocomplete="off"
              autocapitalize="sentences"
              autocorrect="on"
              spellcheck="true"
            />
          </div>
          <button class="mic-btn" id="micBtn" aria-label="Microfoon">🎙</button>
          <button class="send-btn" id="sendBtn" aria-label="Versturen">➤</button>
        </div>

        <div class="command-strip" id="commandStrip">
          <div class="chip"><strong>/</strong>memory</div>
          <div class="chip"><strong>/</strong>projects</div>
          <div class="chip"><strong>/</strong>analyze</div>
          <div class="chip"><strong>/</strong>code</div>
          <div class="chip"><strong>/</strong>image</div>
        </div>

        <div class="status-row">
          <div class="status-pulse"><span class="live"></span><span id="statusText">Solvera is ready</span></div>
          <div id="hintText">Enter = send</div>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="panel" id="leftPanel">
      <h3>Solvera</h3>
      <div class="panel-item" data-action="newchat">Nieuwe chat</div>
      <div class="panel-item" data-action="memory">Memory</div>
      <div class="panel-item" data-action="workspace">Workspace</div>
      <div class="panel-item" data-action="logs">Logs</div>
      <div class="panel-item" data-action="system">System</div>
    </div>

    <div class="panel right" id="rightPanel">
      <h3>Settings</h3>
      <div class="toggle-row">
        <div>Voice input</div>
        <div class="switch on" data-setting="voice"></div>
      </div>
      <div class="toggle-row">
        <div>Auto scroll</div>
        <div class="switch on" data-setting="autoscroll"></div>
      </div>
      <div class="toggle-row">
        <div>Agent hints</div>
        <div class="switch on" data-setting="agenthints"></div>
      </div>
    </div>
  </div>

  <div class="file-modal" id="fileModal">
    <div class="file-modal-card">
      <div class="file-modal-head">
        <div class="file-modal-title" id="fileModalTitle">File</div>
        <button class="icon-btn" id="fileModalClose" aria-label="Sluiten">✕</button>
      </div>
      <div class="file-modal-body" id="fileModalBody"></div>
    </div>
  </div>

  <input id="fileInput" type="file" accept="image/*" class="hidden" />

  <script>
    const API_BASE = "https://solvergpt.onrender.com";
    const API_URL = API_BASE + "/api";
    const presenceRing = document.getElementById("presenceRing");
    const feed = document.getElementById("feed");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const micBtn = document.getElementById("micBtn");
    const plusBtn = document.getElementById("plusBtn");
    const statusText = document.getElementById("statusText");
    const menuBtn = document.getElementById("menuBtn");
    const settingsBtn = document.getElementById("settingsBtn");
    const overlay = document.getElementById("overlay");
    const leftPanel = document.getElementById("leftPanel");
    const rightPanel = document.getElementById("rightPanel");
    const fileInput = document.getElementById("fileInput");
    const fileModal = document.getElementById("fileModal");
    const fileModalTitle = document.getElementById("fileModalTitle");
    const fileModalBody = document.getElementById("fileModalBody");
    const fileModalClose = document.getElementById("fileModalClose");

    const SETTINGS_KEY = "solvera_settings_v2";
    const HISTORY_KEY = "solvera_history_v2";

    let sending = false;
    let autoScroll = true;
    let voiceEnabled = true;
    let agentHints = true;
    let pendingAnalyzePrompt = "";

    let history = loadHistory();

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
        if (typeof saved.voiceEnabled === "boolean") voiceEnabled = saved.voiceEnabled;
        if (typeof saved.autoScroll === "boolean") autoScroll = saved.autoScroll;
        if (typeof saved.agentHints === "boolean") agentHints = saved.agentHints;
      } catch {}
      syncSettingsUI();
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        voiceEnabled,
        autoScroll,
        agentHints
      }));
    }

    function syncSettingsUI() {
      document.querySelector('[data-setting="voice"]')?.classList.toggle("on", voiceEnabled);
      document.querySelector('[data-setting="autoscroll"]')?.classList.toggle("on", autoScroll);
      document.querySelector('[data-setting="agenthints"]')?.classList.toggle("on", agentHints);
    }

    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function saveHistory() {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(-80)));
    }

    function record(msg) {
      history.push(msg);
      saveHistory();
    }

    function scrollToBottom(force = false) {
      if (!autoScroll && !force) return;
      requestAnimationFrame(() => {
        feed.scrollTop = feed.scrollHeight;
      });
    }

    function nearBottom() {
      return feed.scrollHeight - feed.scrollTop - feed.clientHeight < 130;
    }

    feed.addEventListener("scroll", () => {
      autoScroll = nearBottom();
      syncSettingsUI();
      saveSettings();
    });

    function setMode(mode) {
      presenceRing.dataset.mode = mode || "idle";

      if (mode === "agent") {
        statusText.textContent = "Agent actief";
      } else if (mode === "analysis") {
        statusText.textContent = "Bezig met analyseren";
      } else if (mode === "memory") {
        statusText.textContent = "Memory bijgewerkt";
      } else if (mode === "error") {
        statusText.textContent = "Fout";
      } else {
        statusText.textContent = "Solvera is ready";
      }
    }

    function setBusy(isBusy) {
      sending = isBusy;
      sendBtn.disabled = isBusy;
      input.disabled = isBusy;
      micBtn.disabled = isBusy;
      plusBtn.disabled = isBusy;
      sendBtn.style.opacity = isBusy ? "0.72" : "1";
      input.style.opacity = isBusy ? "0.82" : "1";
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function historyForAI() {
      return history
        .filter(m => m.type === "text" && typeof m.content === "string" && m.content.trim())
        .map(m => ({ role: m.role, content: m.content }));
    }

    function createUserRow() {

    function createBotRow() {

    function addTyping() {

    function addImageBubble(url, user = false, label = "afbeelding") {
      const row = document.createElement("div");

      const bubble = document.createElement("div");

    function renderFileList(files) {
      const { row, bubble } = createBotRow();

      const list = Array.isArray(files) ? files : [];
      const safeList = list.filter(f => f && f.name);

      if (!safeList.length) {
        bubble.textContent = "Geen bestanden.";
        feed.appendChild(row);
        scrollToBottom();
        return;
      }

      const wrap = document.createElement("div");
      wrap.className = "card";
      wrap.innerHTML = `
        <div class="card-inner">
          <div class="card-copy">
            <div class="card-kicker">Workspace</div>
            <div class="card-title">Bestanden</div>
            <div class="card-body">Klik om een bestand te openen.</div>
          </div>

          ${safeList.map(f => `<button class="file-chip" data-file="${escapeHtml(f.name)}">${escapeHtml(f.name)}</button>`).join("")}
        </div>
      `;

      bubble.replaceWith(wrap);
      feed.appendChild(row);

      wrap.querySelectorAll("[data-file]").forEach(btn => {
        btn.addEventListener("click", () => openFileViewer(btn.dataset.file));

    function animateTerminal(pre, lines = []) {
      const list = Array.isArray(lines) ? lines : [];
      pre.textContent = "";
      if (!list.length) {
        pre.textContent = "> done";
        return;
      }

      let i = 0;
      const timer = setInterval(() => {
        pre.textContent += (pre.textContent ? "\n" : "") + "> " + list[i];
        i += 1;
        scrollToBottom();
        if (i >= list.length) {
          clearInterval(timer);
        }
      }, 180);
    }

    function renderAgentResult(data) {
      const { row, bubble } = createBotRow();
      const result = data || {};
      const plan = Array.isArray(result.plan) ? result.plan : [];
      const terminal = Array.isArray(result.terminal) ? result.terminal : [];
      const files = Array.isArray(result.files) ? result.files : [];
      const progress = Number.isFinite(result.progress) ? Math.max(0, Math.min(100, result.progress)) : 100;

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-copy">
            <div class="card-kicker">Actie uitvoeren</div>
            <div class="card-title">${escapeHtml(result.summary || "Solvera werkt aan je verzoek")}</div>
            ${plan.length ? `<div class="card-body">${plan.map(s => "• " + escapeHtml(s)).join("<br>")}</div>` : ""}
          </div>
        </div>
        <div class="terminal-box">
          <div class="terminal-head">Terminal</div>
          <pre class="terminal-log"></pre>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar"><span style="width:${progress}%"></span></div>
          <div class="progress-label">${progress}%</div>
        </div>
        ${files.length ? `
          <div class="file-strip">
            ${files.map(f => `<button class="file-chip" data-file="${escapeHtml(f.name)}">${escapeHtml(f.name)}</button>`).join("")}
          </div>
        ` : ""}
        <div class="card-actions">
          <button class="action" data-act="copy">Copy summary</button>
          <button class="action" data-act="memory">Save memory</button>
          <button class="action" data-act="workspace">Workspace</button>
        </div>
      `;

      bubble.replaceWith(card);
      feed.appendChild(row);

      const terminalPre = card.querySelector(".terminal-log");
      animateTerminal(terminalPre, terminal.length ? terminal : ["planning...", "working...", "done"]);

      card.querySelectorAll("[data-file]").forEach(btn => {
        btn.addEventListener("click", () => openFileViewer(btn.dataset.file));
      });

      card.querySelector('[data-act="copy"]').addEventListener("click", async () => {
        await navigator.clipboard.writeText(result.summary || "");
        statusText.textContent = "Samenvatting gekopieerd";
        setTimeout(() => setMode(result.mode || "agent"), 900);
      });

      card.querySelector('[data-act="memory"]').addEventListener("click", async () => {
        const text = result.summary || "Solvera agent resultaat";
        input.value = "onthoud dit: " + text;
        input.focus();
      });

      card.querySelector('[data-act="workspace"]').addEventListener("click", async () => {
        await showWorkspace();
      });

      if (result.mode === "agent") {
        setMode("agent");
      }

      if (result.files && result.files.length) {
        record({
          role: "assistant",
          type: "agent",
          content: result.summary || "Agent resultaat",
          meta: {
            plan,
            files: result.files.map(f => f.name)
          }
        });
      } else {
        record({
          role: "assistant",
          type: "agent",
          content: result.summary || "Agent resultaat",
          meta: { plan }
        });
      }

      scrollToBottom(true);
    }

    function renderStoredHistory() {
      feed.innerHTML = "";

      if (!history.length) {
        addBotText("Hoi Laurens. Hoe kan ik je vandaag helpen?", false);
        return;
      }

      for (const msg of history) {
        if (msg.role === "user") {
          addUserMessage(msg.content, false);
        } else if (msg.type === "agent") {
          renderAgentResult({
            summary: msg.content,
            plan: msg.meta?.plan || [],
            terminal: ["task loaded from history"],
            files: (msg.meta?.files || []).map(name => ({ name, content: "" })),
            progress: 100,
            mode: "agent"
          });
        } else if (msg.type === "image") {
          addImageBubble(msg.content, false, "afbeelding");
        } else {
          addBotText(msg.content, false);
        }
      }

      scrollToBottom(true);
    }

    function clearConversation() {
      history = [];
      saveHistory();
      renderStoredHistory();
    }

    function isAgentIntent(text) {
      const t = text.toLowerCase();
      return (
        t.startsWith("/build") ||
        t.startsWith("/agent") ||
        t.startsWith("/code") ||
        t.includes("maak") ||
        t.includes("build") ||
        t.includes("website") ||
        t.includes("app") ||
        t.includes("fix") ||
        t.includes("debug") ||
        t.includes("terminal") ||
        t.includes("replit") ||
        t.includes("manus") ||
        t.includes("agent")
      );
    }

    async function streamChat(prompt) {
      setMode(detectMode(prompt));
      const responseHistory = historyForAI();
      const row = createBotRow();
      feed.appendChild(row.row);
      scrollToBottom(true);

      const bubble = row.bubble;
      bubble.textContent = "";

      const res = await fetch(API_BASE + "/api/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          input: prompt,
          history: responseHistory
        })
      });

      if (!res.body) {
        const fallback = await res.text();
        bubble.textContent = fallback;
        record({ role: "assistant", type: "text", content: fallback });
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let fullText = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        fullText += chunk;
        bubble.textContent = fullText + "▍";
        scrollToBottom();
      }

      bubble.textContent = fullText;
      record({ role: "assistant", type: "text", content: fullText });
    }

    function detectMode(text) {
      return isAgentIntent(text) ? "agent" : "idle";
    }

    async function runAgent(prompt) {
      setMode("agent");
      const responseHistory = historyForAI();

      const res = await fetch(API_BASE + "/api/agent", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          input: prompt,
          history: responseHistory
        })
      });

      const data = await res.json();
      renderAgentResult(data);
      setMode("agent");
    }

    async function analyzeImageData(dataUrl, prompt) {
      const data = await fetchJSON(API_BASE + "/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          imageBase64: dataUrl,
          prompt: prompt || "Analyseer deze afbeelding"
        })
      });

      return data.result || data.error || "⚠️ Analyse error";
    }

    async function generateImage(prompt) {
      const data = await fetchJSON(API_BASE + "/api/image", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });

      return data.url || data.error || "";
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function handleSelectedImage(file, promptText) {
      if (!file || !file.type || !file.type.startsWith("image/")) {
        addBotText("⚠️ Alleen afbeeldingen werken hier.");
        return;
      }

      const dataUrl = await readFileAsDataURL(file);
      addImageBubble(dataUrl, true, "📷 afbeelding");
      record({ role: "user", type: "image", content: "[afbeelding]" });

      setBusy(true);
      addTyping();
      setMode("analysis");

      try {
        const result = await analyzeImageData(dataUrl, promptText || "Analyseer deze afbeelding");
        removeTyping();
        addBotText(result);
        setMode("idle");
      } catch (err) {
        removeTyping();
        addBotText("⚠️ Analyse error");
        setMode("error");
      } finally {
        setBusy(false);
      }
    }

    async function send() {
      if (sending) return;

      const raw = input.value.trim();
      if (!raw) return;

      const lower = raw.toLowerCase();
      addUserMessage(raw);
      input.value = "";

      setBusy(true);
      addTyping();

      try {
        if (lower.startsWith("/image")) {
          const prompt = raw.replace(/^\/image\s*/i, "").trim();
          removeTyping();

          if (!prompt) {
            addBotText("Typ een prompt na /image.");
            setBusy(false);
            setMode("idle");
            return;
          }

          setMode("analysis");
          const url = await generateImage(prompt);
          if (url.startsWith("http") || url.startsWith("data:")) {
            addImageBubble(url, false, "🖼️ image");
            record({ role: "assistant", type: "image", content: url });
          } else {
            addBotText(url || "⚠️ Image error");
          }

          setBusy(false);
          setMode("idle");
          return;
        }

        if (lower.startsWith("/analyze")) {
          const prompt = raw.replace(/^\/analyze\s*/i, "").trim() || "Analyseer deze afbeelding";
          pendingAnalyzePrompt = prompt;
          removeTyping();
          setBusy(false);
          statusText.textContent = "Kies een afbeelding...";
          fileInput.value = "";
          fileInput.click();
          return;
        }

        if (lower.startsWith("/memory")) {
          const rest = raw.replace(/^\/memory\s*/i, "").trim();
          if (!rest) {
            removeTyping();
            input.value = "onthoud dit: ";
            input.focus();
            setBusy(false);
            setMode("idle");
            return;
          }

          await streamChat(`onthoud dit: ${rest}`);
          setBusy(false);
          setMode("memory");
          return;
        }

        if (lower.startsWith("/projects")) {
          const rest = raw.replace(/^\/projects\s*/i, "").trim();
          const prompt = rest || "Welke projecten ken je van mij?";
          await streamChat(prompt);
          setBusy(false);
          setMode("idle");
          return;
        }

        if (isAgentIntent(raw)) {
          removeTyping();
          if (!agentHints) {
            setMode("agent");
          }
          await runAgent(raw);
          setBusy(false);
          return;
        }

        await streamChat(raw);
        setBusy(false);
        setMode("idle");
      } catch (err) {
        removeTyping();
        addBotText("⚠️ Server error");
        setBusy(false);
        setMode("error");
      }
    }

    sendBtn.addEventListener("click", send);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") send();
    });

    document.querySelectorAll(".chip").forEach((chip) => {
      chip.addEventListener("click", () => {
        const txt = chip.textContent.trim();

        if (txt.includes("/memory")) {
          input.value = "onthoud dit: ";
        } else if (txt.includes("/projects")) {
          input.value = "Welke projecten ken je van mij?";
        } else if (txt.includes("/analyze")) {
          pendingAnalyzePrompt = input.value.trim() || "Analyseer deze afbeelding";
          fileInput.value = "";
          fileInput.click();
          return;
        } else if (txt.includes("/code")) {
          input.value = "Schrijf code voor: ";
        } else if (txt.includes("/image")) {
          input.value = "/image ";
        } else {
          input.value = txt.replace(/\s+/g, " ");
        }

        input.focus();
      });
    });

    plusBtn.addEventListener("click", () => {
      pendingAnalyzePrompt = input.value.trim() || "Analyseer deze afbeelding";
      fileInput.value = "";
      fileInput.click();
    });

    micBtn.addEventListener("click", () => {
      if (!voiceEnabled) {
        statusText.textContent = "Voice uit";
        setTimeout(() => {
          if (!sending) setMode("idle");
        }, 900);
        return;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        statusText.textContent = "Voice niet ondersteund";
        setTimeout(() => {
          if (!sending) setMode("idle");
        }, 1200);
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = "nl-NL";
      recognition.interimResults = true;
      recognition.continuous = false;

      statusText.textContent = "Solvera luistert...";
      recognition.onresult = (e) => {
        const transcript = Array.from(e.results)
          .map(result => result[0].transcript)
          .join(" ");
        input.value = transcript;
      };

      recognition.onerror = () => {
        statusText.textContent = "Voice mislukt";
      };

      recognition.onend = () => {
        if (!sending) setMode("idle");
        if (input.value.trim()) send();
      };

      recognition.start();
    });

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      await handleSelectedImage(file, pendingAnalyzePrompt || "Analyseer deze afbeelding");
      pendingAnalyzePrompt = "";
      fileInput.value = "";
    });

    document.addEventListener("paste", async (e) => {
      const items = Array.from(e.clipboardData?.items || []);
      const imageItem = items.find(item => item.type && item.type.startsWith("image/"));
      if (!imageItem) return;

      const file = imageItem.getAsFile();
      if (!file) return;

      pendingAnalyzePrompt = input.value.trim() || "Analyseer deze afbeelding";
      await handleSelectedImage(file, pendingAnalyzePrompt);
      pendingAnalyzePrompt = "";
    });

    document.addEventListener("dragover", (e) => {
      e.preventDefault();
    });

    document.addEventListener("drop", async (e) => {
      e.preventDefault();
      const files = Array.from(e.dataTransfer?.files || []);
      const imageFile = files.find(file => file.type && file.type.startsWith("image/"));
      if (!imageFile) return;

      pendingAnalyzePrompt = input.value.trim() || "Analyseer deze afbeelding";
      await handleSelectedImage(imageFile, pendingAnalyzePrompt);
      pendingAnalyzePrompt = "";
    });

    loadSettings();
    renderStoredHistory();
    setMode("idle");
  </script>
</body>
</html>
