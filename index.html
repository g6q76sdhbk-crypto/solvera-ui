<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Solvera</title>
<style>
  :root{
    --bg:#05070a;
    --panel:rgba(255,255,255,0.055);
    --line:rgba(255,255,255,0.08);
    --text:rgba(255,255,255,0.96);
    --muted:rgba(255,255,255,0.52);
    --blue:#2da8ff;
    --blue2:#6a5cff;
    --green:#20d46b;
    --shadow:0 20px 80px rgba(0,0,0,0.35);
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    background:
      radial-gradient(circle at 50% 20%, rgba(45,168,255,0.10), transparent 30%),
      radial-gradient(circle at 50% 85%, rgba(106,92,255,0.08), transparent 28%),
      var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",system-ui,sans-serif;
    overflow:hidden;
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
      linear-gradient(to bottom, rgba(255,255,255,0.03), transparent 18%),
      radial-gradient(circle at 50% 25%, rgba(45,168,255,0.10), transparent 18%),
      radial-gradient(circle at 50% 32%, rgba(45,168,255,0.05), transparent 38%);
    pointer-events:none;
  }

  .app{
    position:relative;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    will-change:transform;
    transition:transform .18s ease-out;
  }

  .topbar{
    padding-top:calc(env(safe-area-inset-top) + 12px);
    padding-left:18px;
    padding-right:18px;
    padding-bottom:10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }

  .brand{
    display:flex;
    flex-direction:column;
    gap:6px;
    align-items:center;
    flex:1;
    text-align:center;
    transform:translateX(-8px);
  }

  .brand-title{
    font-size:20px;
    letter-spacing:.42em;
    font-weight:500;
    color:rgba(255,255,255,.85);
    text-indent:.42em;
  }

  .presence{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    min-height:14px;
  }

  .presence-dot{
    width:10px;
    height:10px;
    border-radius:999px;
    background:var(--green);
    box-shadow:0 0 12px rgba(32,212,107,.85);
    animation:pulseDot 3.8s ease-in-out infinite;
  }

  .presence-dot[data-mode="agent"]{background:#8b5cf6; box-shadow:0 0 16px rgba(139,92,246,.9)}
  .presence-dot[data-mode="analysis"]{background:#38bdf8; box-shadow:0 0 16px rgba(56,189,248,.9)}
  .presence-dot[data-mode="error"]{background:#ef4444; box-shadow:0 0 16px rgba(239,68,68,.9)}

  @keyframes pulseDot{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.12)}
  }

  .icon-btn{
    width:38px;
    height:38px;
    border:0;
    border-radius:14px;
    background:rgba(255,255,255,.04);
    color:rgba(255,255,255,.82);
    display:grid;
    place-items:center;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);
    transition:transform .08s ease, opacity .08s ease;
  }
  .icon-btn:active,.send-btn:active,.plus-btn:active,.mic-btn:active,.chip:active,.action:active,.file-chip:active,.panel-item:active{
    transform:scale(.96);
  }

  .hero{
    position:relative;
    min-height:118px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding-top:2px;
    padding-bottom:6px;
  }

  .hero-glow{
    position:absolute;
    width:150px;
    height:150px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(45,168,255,0.18), rgba(45,168,255,0.08) 35%, transparent 68%);
    filter:blur(8px);
    opacity:.9;
    animation:breathe 5s ease-in-out infinite;
  }

  .hero-avatar{
    position:relative;
    width:72px;
    height:72px;
    border-radius:50%;
    overflow:hidden;
    border:1px solid rgba(45,168,255,.22);
    box-shadow:0 0 0 1px rgba(255,255,255,.03), 0 0 24px rgba(45,168,255,.14), inset 0 0 0 1px rgba(255,255,255,.02);
    background:radial-gradient(circle at 30% 20%, rgba(255,255,255,.18), transparent 22%), linear-gradient(180deg, rgba(45,168,255,.22), rgba(0,0,0,.25));
  }

  .hero-avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center top;
    filter:saturate(1.05) contrast(1.04) brightness(1.04) hue-rotate(180deg);
    opacity:.98;
    transform:scale(1.02);
  }

  @keyframes breathe{
    0%,100%{transform:scale(1); opacity:.92}
    50%{transform:scale(1.05); opacity:1}
  }

  .feed{
    position:relative;
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:10px 14px 190px;
    display:flex;
    flex-direction:column;
    gap:14px;
    overscroll-behavior:contain;
  }

  .feed::-webkit-scrollbar{width:0;height:0}

  .message-row{
    display:flex;
    align-items:flex-end;
    gap:10px;
    max-width:100%;
    animation:fadeIn .22s ease;
  }

  @keyframes fadeIn{
    from{opacity:0; transform:translateY(6px)}
    to{opacity:1; transform:translateY(0)}
  }

  .message-row.bot{justify-content:flex-start}
  .message-row.user{justify-content:flex-end}

  .mini-mark{
    width:14px;
    height:14px;
    border-radius:50%;
    flex:0 0 auto;
    border:1px solid rgba(45,168,255,.25);
    box-shadow:0 0 0 1px rgba(255,255,255,.03), 0 0 10px rgba(45,168,255,.16);
    background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.28), rgba(45,168,255,.92));
    margin-bottom:11px;
  }

  .bubble{
    max-width:min(80vw, 560px);
    border-radius:18px;
    padding:12px 14px;
    line-height:1.42;
    letter-spacing:.01em;
    position:relative;
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    box-shadow:var(--shadow);
    word-wrap:break-word;
    overflow-wrap:anywhere;
    white-space:pre-wrap;
    min-height:20px;
  }

  .bubble::after{
    content:"";
    position:absolute;
    bottom:0;
    width:12px;
    height:12px;
    background:inherit;
    filter:brightness(.98);
  }

  .bubble.bot{
    background:linear-gradient(180deg, rgba(255,255,255,.070), rgba(255,255,255,.040));
    border:1px solid rgba(255,255,255,.06);
    color:rgba(255,255,255,.94);
    border-top-left-radius:8px;
  }

  .bubble.bot::after{
    left:-4px;
    clip-path:polygon(100% 0, 0 0, 100% 100%);
    border-bottom-left-radius:4px;
  }

  .bubble.user{
    background:linear-gradient(135deg, rgba(45,168,255,.96), rgba(106,92,255,.86));
    color:white;
    border:1px solid rgba(255,255,255,.08);
    border-top-right-radius:8px;
  }

  .bubble.user::after{
    right:-4px;
    clip-path:polygon(0 0, 0 100%, 100% 0);
    border-bottom-right-radius:4px;
  }

  .name{
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:rgba(78,178,255,.95);
    margin-bottom:5px;
    font-weight:600;
  }

  .assistant-block{
    display:flex;
    flex-direction:column;
    gap:3px;
    max-width:100%;
  }

  .typing{
    display:inline-flex;
    gap:5px;
    align-items:center;
    min-height:18px;
  }

  .typing span{
    width:6px;
    height:6px;
    border-radius:50%;
    background:rgba(78,178,255,.95);
    animation:pulse 1.2s infinite ease-in-out;
    opacity:.6;
  }

  .typing span:nth-child(2){animation-delay:.15s}
  .typing span:nth-child(3){animation-delay:.30s}

  @keyframes pulse{
    0%,100%{transform:translateY(0); opacity:.35}
    40%{transform:translateY(-2px); opacity:1}
  }

  .card{
    margin-top:4px;
    border-radius:22px;
    background:linear-gradient(180deg, rgba(255,255,255,.072), rgba(255,255,255,.045));
    border:1px solid rgba(255,255,255,.07);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    box-shadow:var(--shadow);
    overflow:hidden;
  }

  .card-inner{
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
    padding:14px;
  }

  .card-copy{
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:10px;
    padding-top:2px;
  }

  .card-kicker{
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:rgba(78,178,255,.95);
    font-weight:700;
  }

  .card-title{
    font-size:15px;
    color:rgba(255,255,255,.96);
    line-height:1.5;
  }

  .card-body{
    font-size:13px;
    line-height:1.55;
    color:rgba(255,255,255,.72);
  }

  .terminal-box{
    margin:0 14px 14px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(0,0,0,.36);
    overflow:hidden;
  }

  .terminal-head{
    padding:10px 12px;
    font-size:11px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:rgba(120,140,255,.96);
    border-bottom:1px solid rgba(255,255,255,.06);
  }

  .terminal-log{
    margin:0;
    padding:12px;
    color:rgba(230,230,255,.92);
    font-size:12px;
    line-height:1.55;
    white-space:pre-wrap;
    word-break:break-word;
    font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
  }

  .progress-wrap{
    display:flex;
    align-items:center;
    gap:12px;
    padding:0 14px 14px;
  }

  .progress-bar{
    flex:1;
    height:8px;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    overflow:hidden;
  }

  .progress-bar span{
    display:block;
    height:100%;
    width:0%;
    border-radius:999px;
    background:linear-gradient(90deg, rgba(45,168,255,.95), rgba(106,92,255,.95));
    box-shadow:0 0 18px rgba(106,92,255,.35);
    transition:width .2s ease;
  }

  .progress-label{
    flex:0 0 auto;
    min-width:44px;
    text-align:right;
    color:rgba(255,255,255,.72);
    font-size:12px;
  }

  .file-strip{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    padding:0 14px 14px;
  }

  .file-chip,.action{
    border:1px solid rgba(255,255,255,.07);
    background:rgba(255,255,255,.04);
    color:rgba(255,255,255,.86);
    border-radius:14px;
    padding:10px 12px;
    font-size:13px;
    line-height:1;
  }

  .card-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    padding:0 14px 14px;
  }

  .composer{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    padding:12px 12px calc(env(safe-area-inset-bottom) + 12px);
    background:linear-gradient(to top, rgba(5,7,10,.95), rgba(5,7,10,.82), rgba(5,7,10,0));
    z-index:50;
  }

  .composer-shell{
    border-radius:22px;
    padding:12px;
    background:rgba(255,255,255,.045);
    border:1px solid rgba(78,178,255,.20);
    box-shadow:0 0 0 1px rgba(255,255,255,.03), 0 0 24px rgba(45,168,255,.10), 0 0 70px rgba(45,168,255,.04);
    backdrop-filter:blur(30px);
    -webkit-backdrop-filter:blur(30px);
  }

  .composer-row{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .plus-btn,.send-btn,.mic-btn{
    flex:0 0 auto;
    width:48px;
    height:48px;
    border:0;
    border-radius:16px;
    display:grid;
    place-items:center;
    color:rgba(255,255,255,.88);
  }

  .plus-btn,.mic-btn{
    background:rgba(255,255,255,.05);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);
  }

  .send-btn{
    background:linear-gradient(135deg, rgba(45,168,255,.98), rgba(106,92,255,.92));
    box-shadow:0 0 24px rgba(45,168,255,.26);
  }

  .input-wrap{
    flex:1;
    min-width:0;
    min-height:48px;
    display:flex;
    align-items:center;
    border-radius:16px;
    background:rgba(0,0,0,.16);
    border:1px solid rgba(255,255,255,.06);
    overflow:hidden;
    transition:all .16s ease;
  }

  .input-wrap:focus-within{
    border-color:rgba(45,168,255,.6);
    box-shadow:0 0 12px rgba(45,168,255,.25);
  }

  .input-wrap textarea{
    width:100%;
    border:0;
    outline:none;
    background:transparent;
    color:var(--text);
    font-size:16px;
    padding:12px 14px;
    resize:none;
    max-height:120px;
    line-height:1.4;
    font-family:inherit;
  }

  .input-wrap textarea::placeholder{color:rgba(255,255,255,.35)}

  .command-strip{
    margin-top:10px;
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding-bottom:2px;
    scrollbar-width:none;
  }

  .command-strip::-webkit-scrollbar{display:none}

  .chip{
    flex:0 0 auto;
    padding:9px 12px;
    border-radius:999px;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.06);
    color:rgba(255,255,255,.82);
    font-size:13px;
    transition:transform .08s ease, opacity .08s ease;
  }

  .chip strong{color:rgba(78,178,255,.98); font-weight:700}

  .status-row{
    margin-top:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:rgba(255,255,255,.40);
    font-size:12px;
    padding:0 4px;
  }

  .status-pulse{
    display:inline-flex;
    align-items:center;
    gap:8px;
  }

  .status-pulse .live{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#20d46b;
    box-shadow:0 0 12px rgba(32,212,107,.85);
  }

  .overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.34);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    z-index:100;
    display:none;
  }

  .overlay.open{display:block}

  .panel{
    position:absolute;
    top:0;
    bottom:0;
    width:min(84vw,340px);
    background:rgba(10,12,16,.96);
    border-right:1px solid rgba(255,255,255,.08);
    box-shadow:20px 0 60px rgba(0,0,0,.35);
    padding:18px;
    overflow-y:auto;
  }

  .panel.right{
    right:0;
    left:auto;
    border-right:0;
    border-left:1px solid rgba(255,255,255,.08);
    box-shadow:-20px 0 60px rgba(0,0,0,.35);
  }

  .panel h3{
    margin:0 0 14px;
    font-size:14px;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:rgba(78,178,255,.95);
  }

  .panel-item{
    padding:14px 0;
    border-bottom:1px solid rgba(255,255,255,.06);
    color:rgba(255,255,255,.9);
    font-size:14px;
    cursor:pointer;
    transition:opacity .08s ease;
  }

  .toggle-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:14px 0;
    border-bottom:1px solid rgba(255,255,255,.06);
  }

  .switch{
    width:46px;
    height:28px;
    border-radius:999px;
    background:rgba(255,255,255,.10);
    position:relative;
    flex:0 0 auto;
  }

  .switch.on{background:rgba(45,168,255,.45)}

  .switch::after{
    content:"";
    position:absolute;
    top:3px;
    left:3px;
    width:22px;
    height:22px;
    border-radius:50%;
    background:white;
    transition:transform .18s ease;
  }

  .switch.on::after{transform:translateX(18px)}

  .file-modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    display:none;
    z-index:120;
    padding:18px;
  }

  .file-modal.open{
    display:grid;
    place-items:center;
  }

  .file-modal-card{
    width:min(92vw,720px);
    max-height:86vh;
    overflow:auto;
    background:rgba(10,12,16,.98);
    border:1px solid rgba(255,255,255,.08);
    border-radius:22px;
    box-shadow:0 30px 80px rgba(0,0,0,.45);
  }

  .file-modal-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    padding:14px 16px;
    border-bottom:1px solid rgba(255,255,255,.06);
  }

  .file-modal-title{
    font-size:13px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:rgba(78,178,255,.95);
  }

  .file-modal-body{
    padding:16px;
    color:rgba(240,240,255,.94);
    font-size:13px;
    line-height:1.6;
    white-space:pre-wrap;
    word-break:break-word;
    font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
  }

  .split{
    display:grid;
    grid-template-columns: 1.1fr .9fr;
    gap:12px;
    flex:1;
    min-height:0;
    padding:0 12px;
  }

  .chatPanel,.agentPanel{
    min-height:0;
    border:1px solid rgba(255,255,255,.06);
    border-radius:22px;
    background:rgba(255,255,255,.03);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    overflow:hidden;
  }

  .chatPanel{
    display:flex;
    flex-direction:column;
  }

  .agentPanel{
    display:flex;
    flex-direction:column;
  }

  .panelHead{
    padding:12px 14px;
    border-bottom:1px solid rgba(255,255,255,.06);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:rgba(78,178,255,.95);
  }

  .panelBody{
    flex:1;
    min-height:0;
    overflow:auto;
  }

  .terminalShell{
    height:42%;
    min-height:180px;
    border-bottom:1px solid rgba(255,255,255,.06);
    overflow:auto;
  }

  .previewShell{
    height:34%;
    min-height:180px;
    border-bottom:1px solid rgba(255,255,255,.06);
  }

  .filesShell{
    height:24%;
    min-height:120px;
    overflow:auto;
  }

  .terminalLog{
    margin:0;
    padding:12px 14px;
    font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
    font-size:12px;
    line-height:1.6;
    color:#8affc1;
    text-shadow:0 0 6px rgba(138,255,193,.3);
    white-space:pre-wrap;
    word-break:break-word;
  }

  .previewFrame{
    width:100%;
    height:100%;
    border:0;
    background:white;
  }

  .fileList{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:12px 14px;
  }

  .hidden{display:none !important}

  @media (max-width: 920px){
    .split{
      grid-template-columns:1fr;
    }
    .agentPanel{
      min-height: 260px;
    }
  }

  @media (max-width: 420px){
    .brand-title{font-size:18px; letter-spacing:.36em}
    .bubble{max-width:84vw}
    .hero-avatar{width:64px; height:64px}
    .panel{width:88vw}
    .split{
      padding:0 10px;
      gap:10px;
    }
  }
</style>
</head>
<body>
  <div class="app" id="app">
    <div class="topbar">
      <button class="icon-btn" id="menuBtn" aria-label="Menu">☰</button>

      <div class="brand">
        <div class="brand-title">SOLVERA</div>
        <div class="presence">
          <span class="presence-dot" id="presenceDot" data-mode="idle"></span>
        </div>
      </div>

      <button class="icon-btn" id="settingsBtn" aria-label="Instellingen">⚙</button>
    </div>

    <div class="hero">
      <div class="hero-glow"></div>
      <div class="hero-avatar">
        <img
          id="heroAvatar"
          src="https://raw.githubusercontent.com/g6q76sdhbk-crypto/solvera-ui/main/solvera.PNG"
          alt="Solvera"
        />
      </div>
    </div>

    <div class="split">
      <section class="chatPanel">
        <div class="panelHead">
          <span>Companion</span>
          <span id="statusMini">Ready</span>
        </div>
        <div id="feed" class="feed panelBody" aria-live="polite"></div>
      </section>

      <section class="agentPanel">
        <div class="panelHead">
          <span>Agent</span>
          <span id="agentState">Idle</span>
        </div>
        <div class="terminalShell">
          <pre id="terminal" class="terminalLog">> waiting...</pre>
        </div>
        <div class="previewShell">
          <iframe id="preview" class="previewFrame" sandbox="allow-scripts allow-forms allow-same-origin"></iframe>
        </div>
        <div class="filesShell">
          <div id="files" class="fileList"></div>
        </div>
      </section>
    </div>

    <div class="composer">
      <div class="composer-shell">
        <div class="composer-row">
          <button class="plus-btn" id="plusBtn" aria-label="Acties">+</button>
          <div class="input-wrap">
            <textarea
              id="input"
              rows="1"
              placeholder="Bericht Solvera..."
              autocomplete="off"
              autocapitalize="sentences"
              autocorrect="on"
              spellcheck="true"
            ></textarea>
          </div>
          <button class="mic-btn" id="micBtn" aria-label="Microfoon">🎙</button>
          <button class="send-btn" id="sendBtn" aria-label="Versturen">➤</button>
        </div>

        <div class="command-strip" id="commandStrip">
          <div class="chip"><strong>/</strong>memory</div>
          <div class="chip"><strong>/</strong>projects</div>
          <div class="chip"><strong>/</strong>analyze</div>
          <div class="chip"><strong>/</strong>code</div>
          <div class="chip"><strong>/</strong>image</div>
          <div class="chip"><strong>/</strong>workspace</div>
        </div>

        <div class="status-row">
          <div class="status-pulse"><span class="live"></span><span id="statusText">Solvera is ready</span></div>
          <div id="hintText">Enter = send</div>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="panel" id="leftPanel">
      <h3>Solvera</h3>
      <div class="panel-item" data-action="newchat">Nieuwe chat</div>
      <div class="panel-item" data-action="memory">Memory</div>
      <div class="panel-item" data-action="workspace">Workspace</div>
      <div class="panel-item" data-action="logs">Logs</div>
      <div class="panel-item" data-action="system">System</div>
      <div class="panel-item" data-action="clear">Clear local history</div>
    </div>

    <div class="panel right" id="rightPanel">
      <h3>Settings</h3>
      <div class="toggle-row">
        <div>Voice input</div>
        <div class="switch on" data-setting="voice"></div>
      </div>
      <div class="toggle-row">
        <div>Auto scroll</div>
        <div class="switch on" data-setting="autoscroll"></div>
      </div>
      <div class="toggle-row">
        <div>Agent hints</div>
        <div class="switch on" data-setting="agenthints"></div>
      </div>
    </div>
  </div>

  <div class="file-modal" id="fileModal">
    <div class="file-modal-card">
      <div class="file-modal-head">
        <div class="file-modal-title" id="fileModalTitle">File</div>
        <button class="icon-btn" id="fileModalClose" aria-label="Sluiten">✕</button>
      </div>
      <div class="file-modal-body" id="fileModalBody"></div>
    </div>
  </div>

  <input id="fileInput" type="file" accept="image/*" class="hidden" />

  <script>
    const API_BASE = "https://solvergpt.onrender.com";
    const API_URL = API_BASE + "/api";
    const AVATAR = "https://raw.githubusercontent.com/g6q76sdhbk-crypto/solvera-ui/main/solvera.PNG";

    const app = document.getElementById("app");
    const feed = document.getElementById("feed");
    const terminal = document.getElementById("terminal");
    const preview = document.getElementById("preview");
    const files = document.getElementById("files");

    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const micBtn = document.getElementById("micBtn");
    const plusBtn = document.getElementById("plusBtn");
    const statusText = document.getElementById("statusText");
    const statusMini = document.getElementById("statusMini");
    const agentState = document.getElementById("agentState");
    const menuBtn = document.getElementById("menuBtn");
    const settingsBtn = document.getElementById("settingsBtn");
    const overlay = document.getElementById("overlay");
    const leftPanel = document.getElementById("leftPanel");
    const rightPanel = document.getElementById("rightPanel");
    const fileInput = document.getElementById("fileInput");
    const fileModal = document.getElementById("fileModal");
    const fileModalTitle = document.getElementById("fileModalTitle");
    const fileModalBody = document.getElementById("fileModalBody");
    const fileModalClose = document.getElementById("fileModalClose");
    const presenceDot = document.getElementById("presenceDot");
    const heroAvatar = document.getElementById("heroAvatar");

    heroAvatar.src = AVATAR;

    const SETTINGS_KEY = "solvera_settings_v4";
    const HISTORY_KEY = "solvera_history_v4";

    let sending = false;
    let autoScroll = true;
    let voiceEnabled = true;
    let agentHints = true;
    let pendingAnalyzePrompt = "";
    let history = loadHistory();
    let state = "idle";
    let currentStreamController = null;
    let buffer = "";
    let ticking = false;

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
        if (typeof saved.voiceEnabled === "boolean") voiceEnabled = saved.voiceEnabled;
        if (typeof saved.autoScroll === "boolean") autoScroll = saved.autoScroll;
        if (typeof saved.agentHints === "boolean") agentHints = saved.agentHints;
      } catch {}
      syncSettingsUI();
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        voiceEnabled,
        autoScroll,
        agentHints
      }));
    }

    function syncSettingsUI() {
      document.querySelector('[data-setting="voice"]')?.classList.toggle("on", voiceEnabled);
      document.querySelector('[data-setting="autoscroll"]')?.classList.toggle("on", autoScroll);
      document.querySelector('[data-setting="agenthints"]')?.classList.toggle("on", agentHints);
    }

    function loadHistory() {
      try {
        return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function saveHistory() {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(-100)));
    }

    function record(msg) {
      history.push(msg);
      saveHistory();
    }

    function pruneFeed() {
      const MAX = 45;
      while (feed.children.length > MAX) feed.removeChild(feed.firstChild);
    }

    function scrollToBottom(force = false) {
      if (!autoScroll && !force) return;
      requestAnimationFrame(() => {
        feed.scrollTo({
          top: feed.scrollHeight + 240,
          behavior: force ? "auto" : "smooth"
        });
      });
    }

    function nearBottom() {
      return feed.scrollHeight - feed.scrollTop - feed.clientHeight < 130;
    }

    feed.addEventListener("scroll", () => {
      autoScroll = nearBottom();
      syncSettingsUI();
      saveSettings();
    });

    function setState(next) {
      state = next;
      const map = {
        idle: "Solvera is ready",
        thinking: "Solvera denkt…",
        building: "Solvera bouwt…",
        analyzing: "Solvera analyseert…",
        listening: "Ik luister…",
        error: "Fout"
      };

      presenceDot.dataset.mode = next === "building" ? "agent" : next === "analyzing" ? "analysis" : next === "error" ? "error" : "idle";
      statusText.textContent = map[next] || "Solvera is ready";
      statusMini.textContent = map[next] || "Ready";
      agentState.textContent = next === "building" ? "Running" : next === "analyzing" ? "Analyzing" : next === "listening" ? "Listening" : "Idle";
    }

    function setBusy(isBusy) {
      sending = isBusy;
      sendBtn.disabled = isBusy;
      input.disabled = isBusy;
      micBtn.disabled = isBusy;
      plusBtn.disabled = isBusy;
      sendBtn.style.opacity = isBusy ? "0.72" : "1";
      input.style.opacity = isBusy ? "0.82" : "1";
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function historyForAI() {
      return history
        .filter(m => m.type === "text" && typeof m.content === "string" && m.content.trim())
        .map(m => ({ role: m.role, content: m.content }));
    }

    function createBotRow() {
      const row = document.createElement("div");
      row.className = "message-row bot";

      const mark = document.createElement("div");
      mark.className = "mini-mark";

      const block = document.createElement("div");
      block.className = "assistant-block";

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = "Solvera";

      const bubble = document.createElement("div");
      bubble.className = "bubble bot";

      block.appendChild(name);
      block.appendChild(bubble);
      row.appendChild(mark);
      row.appendChild(block);

      return { row, bubble };
    }

    function createUserRow() {
      const row = document.createElement("div");
      row.className = "message-row user";

      const bubble = document.createElement("div");
      bubble.className = "bubble user";

      row.appendChild(bubble);
      return { row, bubble };
    }

    function addUserMessage(text, persist = true) {
      const { row, bubble } = createUserRow();
      bubble.textContent = text;
      feed.appendChild(row);
      if (persist) record({ role: "user", type: "text", content: text });
      pruneFeed();
      scrollToBottom();
    }

    function addBotText(text, persist = true) {
      const { row, bubble } = createBotRow();
      bubble.textContent = text;
      feed.appendChild(row);
      if (persist) record({ role: "assistant", type: "text", content: text });
      pruneFeed();
      scrollToBottom();
    }

    function addTyping() {
      const row = document.createElement("div");
      row.className = "message-row bot";
      row.id = "typingRow";

      const mark = document.createElement("div");
      mark.className = "mini-mark";

      const block = document.createElement("div");
      block.className = "assistant-block";

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = "Solvera";

      const bubble = document.createElement("div");
      bubble.className = "bubble bot";
      bubble.innerHTML = `
        <div class="typing" aria-label="Solvera typt">
          <span></span><span></span><span></span>
        </div>
      `;

      block.appendChild(name);
      block.appendChild(bubble);
      row.appendChild(mark);
      row.appendChild(block);

      feed.appendChild(row);
      pruneFeed();
      scrollToBottom(true);
    }

    function removeTyping() {
      const row = document.getElementById("typingRow");
      if (row) row.remove();
    }

    function addImageBubble(url, user = false, label = "afbeelding") {
      const row = document.createElement("div");
      row.className = "message-row " + (user ? "user" : "bot");

      const bubble = document.createElement("div");
      bubble.className = "bubble " + (user ? "user" : "bot");
      bubble.style.padding = "10px";
      bubble.style.maxWidth = "78vw";
      bubble.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="font-size:13px;opacity:.92">${escapeHtml(label)}</div>
          <img src="${escapeHtml(url)}" alt="image" style="width:100%;border-radius:12px;display:block" />
        </div>
      `;

      if (!user) {
        const mark = document.createElement("div");
        mark.className = "mini-mark";
        const block = document.createElement("div");
        block.className = "assistant-block";
        const name = document.createElement("div");
        name.className = "name";
        name.textContent = "Solvera";
        block.appendChild(name);
        block.appendChild(bubble);
        row.appendChild(mark);
        row.appendChild(block);
      } else {
        row.appendChild(bubble);
      }

      feed.appendChild(row);
      pruneFeed();
      scrollToBottom();
      return row;
    }

    function renderTerminalLines(lines = []) {
      terminal.textContent = "";
      const list = Array.isArray(lines) ? lines : [];
      if (!list.length) {
        terminal.textContent = "> done";
        return;
      }

      let i = 0;
      const t = setInterval(() => {
        terminal.textContent += (terminal.textContent ? "\n" : "") + "> " + list[i];
        i += 1;
        terminal.scrollTop = terminal.scrollHeight;
        if (i >= list.length) clearInterval(t);
      }, 120);
    }

    function renderFileList(dataFiles = []) {
      files.innerHTML = "";
      const list = Array.isArray(dataFiles) ? dataFiles : [];
      if (!list.length) {
        const empty = document.createElement("div");
        empty.className = "file-chip";
        empty.textContent = "No files";
        files.appendChild(empty);
        return;
      }

      list.forEach((f) => {
        const btn = document.createElement("button");
        btn.className = "file-chip";
        btn.textContent = f.name;

        btn.addEventListener("click", () => {
          openFileViewer(f.name, f.content);
        });

        files.appendChild(btn);
      });
    }

    function renderPreview(filesData = []) {
      const html = (filesData || []).find(f => String(f.name || "").toLowerCase().endsWith(".html"));
      if (!html) {
        preview.srcdoc = `<html><body style="font-family:system-ui;padding:20px;background:#111;color:#fff">No HTML preview</body></html>`;
        return;
      }
      preview.srcdoc = html.content || "";
    }

    function renderAgentResult(data) {
      const result = data || {};
      const plan = Array.isArray(result.plan) ? result.plan : [];
      const terminalLines = Array.isArray(result.terminal) ? result.terminal : [];
      const filesData = Array.isArray(result.files) ? result.files : [];
      const progress = Number.isFinite(result.progress) ? Math.max(0, Math.min(100, result.progress)) : 100;

      const { row, bubble } = createBotRow();
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-copy">
            <div class="card-kicker">Agent</div>
            <div class="card-title">${escapeHtml(result.summary || "Solvera werkt aan je verzoek")}</div>
            ${plan.length ? `<div class="card-body">${plan.map(s => "• " + escapeHtml(s)).join("<br>")}</div>` : ""}
          </div>
        </div>

        <div class="terminal-box">
          <div class="terminal-head">Terminal</div>
          <pre class="terminal-log"></pre>
        </div>

        <div class="progress-wrap">
          <div class="progress-bar"><span style="width:${progress}%"></span></div>
          <div class="progress-label">${progress}%</div>
        </div>

        ${filesData.length ? `
          <div class="file-strip">
            ${filesData.map(f => `<button class="file-chip" data-file="${escapeHtml(f.name)}">${escapeHtml(f.name)}</button>`).join("")}
          </div>
        ` : ""}

        <div class="card-actions">
          <button class="action" data-act="copy">Copy summary</button>
          <button class="action" data-act="memory">Save memory</button>
          <button class="action" data-act="workspace">Workspace</button>
        </div>
      `;

      bubble.replaceWith(card);
      feed.appendChild(row);
      pruneFeed();

      const terminalPre = card.querySelector(".terminal-log");
      terminalPre.textContent = "";
      renderTerminalLines(terminalLines.length ? terminalLines : ["> planning...", "> working...", "> done"]);

      card.querySelectorAll("[data-file]").forEach(btn => {
        btn.addEventListener("click", () => {
          const name = btn.dataset.file;
          const content = (filesData.find(f => f.name === name) || {}).content || "";
          openFileViewer(name, content);
        });
      });

      card.querySelector('[data-act="copy"]').addEventListener("click", async () => {
        await navigator.clipboard.writeText(result.summary || "");
        statusText.textContent = "Samenvatting gekopieerd";
        setTimeout(() => setState("idle"), 800);
      });

      card.querySelector('[data-act="memory"]').addEventListener("click", async () => {
        input.value = "onthoud dit: " + (result.summary || "Solvera agent resultaat");
        autoResizeInput();
        input.focus();
      });

      card.querySelector('[data-act="workspace"]').addEventListener("click", async () => {
        await showWorkspace();
      });

      if (result.files && result.files.length) {
        renderPreview(result.files);
        renderFileList(result.files);
      }

      record({
        role: "assistant",
        type: "agent",
        content: result.summary || "Agent resultaat",
        meta: { plan, files: (result.files || []).map(f => f.name) }
      });

      scrollToBottom(true);
    }

    function renderStoredHistory() {
      feed.innerHTML = "";

      if (!history.length) {
        addBotText("Hoi Laurens. Hoe kan ik je vandaag helpen?", false);
        return;
      }

      for (const msg of history) {
        if (msg.role === "user") {
          addUserMessage(msg.content, false);
        } else if (msg.type === "agent") {
          renderAgentResult({
            summary: msg.content,
            plan: msg.meta?.plan || [],
            terminal: ["task loaded from history"],
            files: (msg.meta?.files || []).map(name => ({ name, content: "" })),
            progress: 100,
            mode: "agent"
          });
        } else if (msg.type === "image") {
          addImageBubble(msg.content, false, "afbeelding");
        } else {
          addBotText(msg.content, false);
        }
      }

      scrollToBottom(true);
    }

    function clearConversation() {
      history = [];
      saveHistory();
      renderStoredHistory();
    }

    async function fetchJSON(url, options) {
      const res = await fetch(url, options);
      const contentType = res.headers.get("content-type") || "";
      if (!contentType.includes("application/json")) {
        const text = await res.text();
        throw new Error(text.slice(0, 200) || "Server gaf geen JSON terug");
      }
      return await res.json();
    }

    async function showMemoryCard() {
      const data = await fetchJSON(API_BASE + "/api/system");
      const memory = data.memory || {};
      const { row, bubble } = createBotRow();

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-copy">
            <div class="card-kicker">Memory</div>
            <div class="card-title">${escapeHtml(memory.name || "Laurens")}</div>
            <div class="card-body">
              Projects: ${escapeHtml((memory.projects || []).join(", ") || "none")}<br>
              Goals: ${escapeHtml((memory.goals || []).join(", ") || "none")}<br>
              Preferences: ${escapeHtml((memory.preferences || []).join(", ") || "none")}<br>
              Notes: ${escapeHtml((memory.notes || []).join(" | ") || "none")}
            </div>
          </div>
        </div>
      `;

      bubble.replaceWith(card);
      feed.appendChild(row);
      pruneFeed();
      scrollToBottom();
    }

    async function showWorkspace() {
      const data = await fetchJSON(API_BASE + "/api/files");
      renderFileList(data.files || []);
    }

    async function showLogs() {
      const recent = history.slice(-10).map((m) => `${m.role.toUpperCase()}: ${m.content}`);
      const { row, bubble } = createBotRow();

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="card-inner">
          <div class="card-copy">
            <div class="card-kicker">Logs</div>
            <div class="card-title">Laatste events</div>
            <div class="card-body">${escapeHtml(recent.join("\n\n") || "No logs")}</div>
          </div>
        </div>
      `;

      bubble.replaceWith(card);
      feed.appendChild(row);
      pruneFeed();
      scrollToBottom();
    }

    function openFileViewer(name, content) {
      fileModalTitle.textContent = name;
      fileModalBody.textContent = content || "Geen inhoud";
      fileModal.classList.add("open");
    }

    function closeFileViewer() {
      fileModal.classList.remove("open");
    }

    fileModalClose.addEventListener("click", closeFileViewer);
    fileModal.addEventListener("click", (e) => {
      if (e.target === fileModal) closeFileViewer();
    });

    function openOverlay(side = "left") {
      overlay.classList.add("open");
      leftPanel.style.display = side === "left" ? "block" : "none";
      rightPanel.style.display = side === "right" ? "block" : "none";
    }

    function closeOverlay() {
      overlay.classList.remove("open");
    }

    menuBtn.addEventListener("click", () => openOverlay("left"));
    settingsBtn.addEventListener("click", () => openOverlay("right"));
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeOverlay();
    });

    document.querySelectorAll(".switch").forEach((sw) => {
      sw.addEventListener("click", () => {
        const key = sw.dataset.setting;
        if (key === "voice") {
          voiceEnabled = !voiceEnabled;
          sw.classList.toggle("on", voiceEnabled);
        } else if (key === "autoscroll") {
          autoScroll = !autoScroll;
          sw.classList.toggle("on", autoScroll);
        } else if (key === "agenthints") {
          agentHints = !agentHints;
          sw.classList.toggle("on", agentHints);
        }
        saveSettings();
      });
    });

    leftPanel.querySelectorAll("[data-action]").forEach((item) => {
      item.addEventListener("click", async () => {
        const action = item.dataset.action;

        if (action === "newchat") clearConversation();
        if (action === "memory") await showMemoryCard();
        if (action === "workspace") await showWorkspace();
        if (action === "logs") await showLogs();

        if (action === "system") {
          const data = await fetchJSON(API_BASE + "/api/system");
          const { row, bubble } = createBotRow();
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="card-inner">
              <div class="card-copy">
                <div class="card-kicker">System</div>
                <div class="card-title">Solvera Core</div>
                <div class="card-body">
                  Workspace files: ${escapeHtml(String((data.workspaceFiles || []).length))}<br>
                  Companion model: gpt-4.1-mini<br>
                  Agent model: gpt-4.1
                </div>
              </div>
            </div>
          `;
          bubble.replaceWith(card);
          feed.appendChild(row);
          pruneFeed();
          scrollToBottom();
        }

        if (action === "clear") {
          localStorage.removeItem(HISTORY_KEY);
          history = [];
          renderStoredHistory();
          terminal.textContent = "> waiting...";
          files.innerHTML = "";
          preview.srcdoc = `<html><body style="font-family:system-ui;padding:20px;background:#111;color:#fff">No preview</body></html>`;
        }

        closeOverlay();
      });
    });

    function isAgentIntent(text) {
      const t = text.toLowerCase();
      return (
        t.startsWith("/build") ||
        t.startsWith("/agent") ||
        t.startsWith("/code") ||
        t.includes("maak") ||
        t.includes("build") ||
        t.includes("website") ||
        t.includes("app") ||
        t.includes("fix") ||
        t.includes("debug") ||
        t.includes("terminal") ||
        t.includes("replit") ||
        t.includes("manus") ||
        t.includes("agent")
      );
    }

    function isImageIntent(text) {
      const t = text.toLowerCase();
      return t.startsWith("/image") || (t.includes("genereer") && t.includes("afbeelding"));
    }

    function isAnalyzeIntent(text) {
      return text.toLowerCase().startsWith("/analyze");
    }

    function isMemoryIntent(text) {
      return text.toLowerCase().startsWith("/memory");
    }

    function isWorkspaceIntent(text) {
      return text.toLowerCase().startsWith("/workspace");
    }

    function autoResizeInput() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    }

    input.addEventListener("input", autoResizeInput);

    async function streamChat(prompt) {
      const responseHistory = historyForAI();
      const row = createBotRow();
      feed.appendChild(row.row);
      pruneFeed();
      scrollToBottom(true);

      const bubble = row.bubble;
      bubble.textContent = "";

      let fullText = "";
      buffer = "";
      ticking = false;

      currentStreamController = new AbortController();

      try {
        const res = await fetch(API_BASE + "/api/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            input: prompt,
            history: responseHistory
          }),
          signal: currentStreamController.signal
        });

        if (!res.ok) {
          const fallback = await res.text();
          bubble.textContent = fallback;
          record({ role: "assistant", type: "text", content: fallback });
          return;
        }

        if (!res.body) {
          const fallback = await res.text();
          bubble.textContent = fallback;
          record({ role: "assistant", type: "text", content: fallback });
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder("utf-8");

        const appendBuffered = () => {
          if (ticking) return;
          ticking = true;
          requestAnimationFrame(() => {
            if (buffer) {
              fullText += buffer;
              bubble.textContent = fullText + "▍";
              buffer = "";
              scrollToBottom();
            }
            ticking = false;
          });
        };

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          appendBuffered();
        }

        if (buffer) {
          fullText += buffer;
          buffer = "";
        }

        bubble.textContent = fullText;
        record({ role: "assistant", type: "text", content: fullText });
      } catch (err) {
        if (err?.name !== "AbortError") {
          bubble.textContent = "⚠️ Server error";
          record({ role: "assistant", type: "text", content: "⚠️ Server error" });
          setState("error");
        }
      } finally {
        currentStreamController = null;
      }
    }

    async function runAgent(prompt) {
      const responseHistory = historyForAI();

      const { row, bubble } = createBotRow();
      feed.appendChild(row);
      pruneFeed();
      scrollToBottom(true);

      const loading = document.createElement("div");
      loading.className = "card";
      loading.innerHTML = `
        <div class="card-inner">
          <div class="card-copy">
            <div class="card-kicker">Actie uitvoeren</div>
            <div class="card-title">Solvera plant en werkt...</div>
            <div class="card-body">Terminal wordt opgebouwd.</div>
          </div>
        </div>
        <div class="terminal-box">
          <div class="terminal-head">Terminal</div>
          <pre class="terminal-log">> starting...</pre>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar"><span style="width:12%"></span></div>
          <div class="progress-label">12%</div>
        </div>
      `;
      bubble.replaceWith(loading);

      setState("building");

      try {
        const res = await fetch(API_BASE + "/api/agent", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            input: prompt,
            history: responseHistory
          })
        });

        const data = await res.json();
        renderAgentResult(data);
      } catch (err) {
        const fail = createBotRow();
        fail.bubble.textContent = "⚠️ Agent error";
        loading.replaceWith(fail.row);
        setState("error");
      }
    }

    async function analyzeImageData(dataUrl, prompt) {
      const data = await fetchJSON(API_BASE + "/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          imageBase64: dataUrl,
          prompt: prompt || "Analyseer deze afbeelding"
        })
      });

      return data.result || data.error || "⚠️ Analyse error";
    }

    async function generateImage(prompt) {
      const data = await fetchJSON(API_BASE + "/api/image", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });

      return data.url || data.error || "";
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function handleSelectedImage(file, promptText) {
      if (!file || !file.type || !file.type.startsWith("image/")) {
        addBotText("⚠️ Alleen afbeeldingen werken hier.");
        return;
      }

      const dataUrl = await readFileAsDataURL(file);
      addImageBubble(dataUrl, true, "📷 afbeelding");
      record({ role: "user", type: "image", content: "[afbeelding]" });

      setBusy(true);
      addTyping();
      setState("analyzing");

      try {
        const result = await analyzeImageData(dataUrl, promptText || "Analyseer deze afbeelding");
        removeTyping();
        addBotText(result);
        setState("idle");
      } catch (err) {
        removeTyping();
        addBotText("⚠️ Analyse error");
        setState("error");
      } finally {
        setBusy(false);
      }
    }

    async function send() {
      if (sending) return;

      const raw = input.value.trim();
      if (!raw) return;

      const lower = raw.toLowerCase();
      addUserMessage(raw);
      input.value = "";
      input.style.height = "auto";
      setBusy(true);
      addTyping();

      try {
        if (isImageIntent(raw)) {
          removeTyping();

          const prompt = raw.replace(/^\/image\s*/i, "").trim();
          if (!prompt) {
            addBotText("Typ een prompt na /image.");
            setBusy(false);
            setState("idle");
            return;
          }

          setState("analyzing");
          const url = await generateImage(prompt);
          if (url.startsWith("http") || url.startsWith("data:")) {
            addImageBubble(url, false, "🖼️ image");
            record({ role: "assistant", type: "image", content: url });
          } else {
            addBotText(url || "⚠️ Image error");
          }

          setBusy(false);
          setState("idle");
          return;
        }

        if (isAnalyzeIntent(raw)) {
          const prompt = raw.replace(/^\/analyze\s*/i, "").trim() || "Analyseer deze afbeelding";
          pendingAnalyzePrompt = prompt;
          removeTyping();
          setBusy(false);
          statusText.textContent = "Kies een afbeelding...";
          fileInput.value = "";
          fileInput.click();
          return;
        }

        if (isMemoryIntent(raw)) {
          const rest = raw.replace(/^\/memory\s*/i, "").trim();
          if (!rest) {
            removeTyping();
            input.value = "onthoud dit: ";
            autoResizeInput();
            input.focus();
            setBusy(false);
            setState("idle");
            return;
          }

          await streamChat(`onthoud dit: ${rest}`);
          setBusy(false);
          setState("memory");
          setTimeout(() => setState("idle"), 700);
          return;
        }

        if (lower.startsWith("/projects")) {
          const rest = raw.replace(/^\/projects\s*/i, "").trim();
          const prompt = rest || "Welke projecten ken je van mij?";
          await streamChat(prompt);
          setBusy(false);
          setState("idle");
          return;
        }

        if (isWorkspaceIntent(raw)) {
          removeTyping();
          await showWorkspace();
          setBusy(false);
          setState("idle");
          return;
        }

        if (isAgentIntent(raw)) {
          removeTyping();
          if (!agentHints) setState("building");
          await runAgent(raw);
          setBusy(false);
          return;
        }

        await streamChat(raw);
        setBusy(false);
        setState("idle");
      } catch (err) {
        removeTyping();
        addBotText("⚠️ Server error");
        setBusy(false);
        setState("error");
      }
    }

    function stopCurrentStream() {
      if (currentStreamController) {
        currentStreamController.abort();
        currentStreamController = null;
      }
    }

    function applyCommandChip(text) {
      if (text.includes("/memory")) {
        input.value = "onthoud dit: ";
      } else if (text.includes("/projects")) {
        input.value = "Welke projecten ken je van mij?";
      } else if (text.includes("/analyze")) {
        pendingAnalyzePrompt = input.value.trim() || "Analyseer deze afbeelding";
        fileInput.value = "";
        fileInput.click();
        return;
      } else if (text.includes("/code")) {
        input.value = "Schrijf code voor: ";
      } else if (text.includes("/image")) {
        input.value = "/image ";
      } else if (text.includes("/workspace")) {
        showWorkspace();
        return;
      } else {
        input.value = text.replace(/\s+/g, " ");
      }
      autoResizeInput();
      input.focus();
    }

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    document.querySelectorAll(".chip").forEach((chip) => {
      chip.addEventListener("click", () => applyCommandChip(chip.textContent.trim()));
    });

    plusBtn.addEventListener("click", () => {
      pendingAnalyzePrompt = input.value.trim() || "Analyseer deze afbeelding";
      fileInput.value = "";
      fileInput.click();
    });

    micBtn.addEventListener("click", () => {
      if (!voiceEnabled) {
        statusText.textContent = "Voice uit";
        setTimeout(() => { if (!sending) setState("idle"); }, 900);
        return;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        statusText.textContent = "Voice niet ondersteund";
        setTimeout(() => { if (!sending) setState("idle"); }, 1200);
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = "nl-NL";
      recognition.interimResults = true;
      recognition.continuous = false;

      setState("listening");
      recognition.onresult = (e) => {
        const transcript = Array.from(e.results).map(result => result[0].transcript).join(" ");
        input.value = transcript;
        autoResizeInput();
      };

      recognition.onerror = () => {
        statusText.textContent = "Voice mislukt";
      };

      recognition.onend = () => {
        if (!sending) setState("idle");
        if (input.value.trim()) send();
      };

      recognition.start();
    });

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      await handleSelectedImage(file, pendingAnalyzePrompt || "Analyseer deze afbeelding");
      pendingAnalyzePrompt = "";
      fileInput.value = "";
    });

    document.addEventListener("paste", async (e) => {
      const items = Array.from(e.clipboardData?.items || []);
      const imageItem = items.find(item => item.type && item.type.startsWith("image/"));
      if (!imageItem) return;

      const file = imageItem.getAsFile();
      if (!file) return;

      pendingAnalyzePrompt = input.value.trim() || "Analyseer deze afbeelding";
      await handleSelectedImage(file, pendingAnalyzePrompt);
      pendingAnalyzePrompt = "";
    });

    document.addEventListener("dragover", (e) => {
      e.preventDefault();
    });

    document.addEventListener("drop", async (e) => {
      e.preventDefault();
      const files = Array.from(e.dataTransfer?.files || []);
      const imageFile = files.find(file => file.type && file.type.startsWith("image/"));
      if (!imageFile) return;

      pendingAnalyzePrompt = input.value.trim() || "Analyseer deze afbeelding";
      await handleSelectedImage(imageFile, pendingAnalyzePrompt);
      pendingAnalyzePrompt = "";
    });

    function fixViewport() {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty("--vh", `${vh}px`);
      app.style.height = `calc(var(--vh, 1vh) * 100)`;
    }

    window.addEventListener("resize", fixViewport);
    fixViewport();

    document.addEventListener("mousemove", (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 4;
      const y = (e.clientY / window.innerHeight - 0.5) * 4;
      app.style.transform = `translate(${x}px, ${y}px)`;
    });

    setInterval(() => {
      if (Math.random() < 0.12 && !sending) {
        statusText.textContent = "Solvera kijkt mee…";
        setTimeout(() => { if (!sending) setState("idle"); }, 1400);
      }
    }, 12000);

    loadSettings();
    renderStoredHistory();
    setState("idle");
  </script>
</body>
</html>
