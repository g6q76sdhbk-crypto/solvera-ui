<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Solvera</title>
<style>
  :root{
    --bg: #05070a;
    --panel: rgba(255,255,255,0.055);
    --panel-strong: rgba(255,255,255,0.075);
    --line: rgba(255,255,255,0.08);
    --text: rgba(255,255,255,0.96);
    --muted: rgba(255,255,255,0.52);
    --blue: #2da8ff;
    --blue2: #6a5cff;
    --shadow: 0 20px 80px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(circle at 50% 20%, rgba(45,168,255,0.10), transparent 30%),
      radial-gradient(circle at 50% 85%, rgba(106,92,255,0.08), transparent 28%),
      var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
    overflow: hidden;
  }

  body::before{
    content:"";
    position: fixed;
    inset: 0;
    background:
      linear-gradient(to bottom, rgba(255,255,255,0.03), transparent 18%),
      radial-gradient(circle at 50% 25%, rgba(45,168,255,0.10), transparent 18%),
      radial-gradient(circle at 50% 32%, rgba(45,168,255,0.05), transparent 38%);
    pointer-events: none;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .topbar {
    padding-top: calc(env(safe-area-inset-top) + 12px);
    padding-left: 18px;
    padding-right: 18px;
    padding-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 3px;
    align-items: center;
    flex: 1;
    text-align: center;
    transform: translateX(-8px);
  }

  .brand-title {
    font-size: 20px;
    letter-spacing: 0.42em;
    font-weight: 500;
    color: rgba(255,255,255,0.85);
    text-indent: 0.42em;
  }

  .brand-sub {
    font-size: 12px;
    color: rgba(94, 205, 140, 0.95);
    letter-spacing: 0.12em;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 999px;
    background: #20d46b;
    box-shadow: 0 0 12px rgba(32,212,107,0.85);
    display: inline-block;
  }

  .icon-btn {
    width: 38px;
    height: 38px;
    border: 0;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.82);
    display: grid;
    place-items: center;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  .hero {
    position: relative;
    min-height: 126px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 2px;
    padding-bottom: 10px;
  }

  .hero-glow {
    position: absolute;
    width: 170px;
    height: 170px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(45,168,255,0.22), rgba(45,168,255,0.08) 35%, transparent 68%);
    filter: blur(6px);
    animation: breathe 5s ease-in-out infinite;
  }

  .hero-avatar {
    position: relative;
    width: 92px;
    height: 92px;
    border-radius: 50%;
    overflow: hidden;
    border: 1px solid rgba(45,168,255,0.22);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 0 24px rgba(45,168,255,0.14),
      inset 0 0 0 1px rgba(255,255,255,0.02);
    background:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,0.18), transparent 22%),
      linear-gradient(180deg, rgba(45,168,255,0.22), rgba(0,0,0,0.25));
  }

  .hero-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    filter: saturate(1.05) contrast(1.04) brightness(1.05) hue-rotate(180deg);
    opacity: 0.96;
    transform: scale(1.02);
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.92; }
    50% { transform: scale(1.05); opacity: 1; }
  }

  .feed {
    position: relative;
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px 170px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overscroll-behavior: contain;
  }

  .feed::-webkit-scrollbar { width: 0; height: 0; }

  .message-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    max-width: 100%;
  }

  .message-row.bot {
    justify-content: flex-start;
  }

  .message-row.user {
    justify-content: flex-end;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    flex: 0 0 auto;
    overflow: hidden;
    border: 1px solid rgba(45,168,255,0.20);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 0 12px rgba(45,168,255,0.12);
    background: rgba(255,255,255,0.03);
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    filter: saturate(1.05) contrast(1.05) brightness(1.02) hue-rotate(180deg);
  }

  .bubble {
    max-width: min(78vw, 520px);
    border-radius: 18px;
    padding: 12px 14px;
    line-height: 1.42;
    letter-spacing: 0.01em;
    position: relative;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: var(--shadow);
    word-wrap: break-word;
    overflow-wrap: anywhere;
    white-space: pre-wrap;
  }

  .bubble::after {
    content: "";
    position: absolute;
    bottom: 0;
    width: 12px;
    height: 12px;
    background: inherit;
    filter: brightness(0.98);
  }

  .bubble.bot {
    background:
      linear-gradient(180deg, rgba(255,255,255,0.070), rgba(255,255,255,0.040));
    border: 1px solid rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.94);
    border-top-left-radius: 8px;
  }

  .bubble.bot::after {
    left: -4px;
    clip-path: polygon(100% 0, 0 0, 100% 100%);
    border-bottom-left-radius: 4px;
  }

  .bubble.user {
    background: linear-gradient(135deg, rgba(45,168,255,0.96), rgba(106,92,255,0.86));
    color: white;
    border: 1px solid rgba(255,255,255,0.08);
    border-top-right-radius: 8px;
  }

  .bubble.user::after {
    right: -4px;
    clip-path: polygon(0 0, 0 100%, 100% 0);
    border-bottom-right-radius: 4px;
  }

  .meta {
    margin-top: 8px;
    font-size: 11px;
    color: rgba(255,255,255,0.40);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .name {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(78, 178, 255, 0.95);
    margin-bottom: 5px;
    font-weight: 600;
  }

  .assistant-block {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .typing {
    display: inline-flex;
    gap: 5px;
    align-items: center;
    min-height: 18px;
  }

  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(78, 178, 255, 0.95);
    animation: pulse 1.1s infinite ease-in-out;
  }

  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.30s; }

  @keyframes pulse {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
    40% { transform: translateY(-3px); opacity: 1; }
  }

  .card {
    margin-top: 4px;
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(255,255,255,0.072), rgba(255,255,255,0.045));
    border: 1px solid rgba(255,255,255,0.07);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .card-inner {
    display: grid;
    grid-template-columns: 112px 1fr;
    gap: 14px;
    padding: 14px;
  }

  .card-image {
    width: 100%;
    aspect-ratio: 1 / 1.18;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.07);
    background: rgba(0,0,0,0.3);
  }

  .card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .card-copy {
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-top: 2px;
  }

  .card-kicker {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(78, 178, 255, 0.95);
    font-weight: 700;
  }

  .card-title {
    font-size: 15px;
    color: rgba(255,255,255,0.96);
    line-height: 1.5;
  }

  .card-body {
    font-size: 13px;
    line-height: 1.55;
    color: rgba(255,255,255,0.72);
  }

  .card-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 0 14px 14px;
  }

  .action {
    border: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.86);
    border-radius: 14px;
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1;
  }

  .mem-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 0 14px 14px;
  }

  .mem-col {
    border-radius: 16px;
    padding: 12px 12px 11px;
    background: rgba(255,255,255,0.035);
    border: 1px solid rgba(255,255,255,0.06);
    min-width: 0;
  }

  .mem-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(78, 178, 255, 0.95);
    font-weight: 700;
    margin-bottom: 8px;
  }

  .mem-text {
    font-size: 12px;
    line-height: 1.5;
    color: rgba(255,255,255,0.72);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .composer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 12px 12px calc(env(safe-area-inset-bottom) + 12px);
    background: linear-gradient(to top, rgba(5,7,10,0.95), rgba(5,7,10,0.82), rgba(5,7,10,0.0));
    z-index: 50;
  }

  .composer-shell {
    border-radius: 22px;
    padding: 12px;
    background: rgba(255,255,255,0.045);
    border: 1px solid rgba(78, 178, 255, 0.20);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03),
      0 0 24px rgba(45,168,255,0.10),
      0 0 70px rgba(45,168,255,0.04);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
  }

  .composer-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .plus-btn, .send-btn, .mic-btn {
    flex: 0 0 auto;
    width: 48px;
    height: 48px;
    border: 0;
    border-radius: 16px;
    display: grid;
    place-items: center;
    color: rgba(255,255,255,0.88);
  }

  .plus-btn, .mic-btn {
    background: rgba(255,255,255,0.05);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  .send-btn {
    background: linear-gradient(135deg, rgba(45,168,255,0.98), rgba(106,92,255,0.92));
    box-shadow: 0 0 24px rgba(45,168,255,0.26);
  }

  .input-wrap {
    flex: 1;
    min-width: 0;
    height: 48px;
    display: flex;
    align-items: center;
    border-radius: 16px;
    background: rgba(0,0,0,0.16);
    border: 1px solid rgba(255,255,255,0.06);
    overflow: hidden;
  }

  .input-wrap input {
    width: 100%;
    border: 0;
    outline: none;
    background: transparent;
    color: var(--text);
    font-size: 16px;
    padding: 0 14px;
  }

  .input-wrap input::placeholder {
    color: rgba(255,255,255,0.35);
  }

  .command-strip {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }

  .command-strip::-webkit-scrollbar { display: none; }

  .chip {
    flex: 0 0 auto;
    padding: 9px 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.82);
    font-size: 13px;
  }

  .chip strong {
    color: rgba(78, 178, 255, 0.98);
    font-weight: 700;
  }

  .status-row {
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: rgba(255,255,255,0.40);
    font-size: 12px;
    padding: 0 4px;
  }

  .status-pulse {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .status-pulse .live {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #20d46b;
    box-shadow: 0 0 12px rgba(32,212,107,0.85);
  }

  .hidden {
    display: none !important;
  }

  @media (max-width: 420px){
    .brand-title { font-size: 18px; letter-spacing: 0.36em; }
    .bubble { max-width: 80vw; }
    .card-inner { grid-template-columns: 98px 1fr; }
    .mem-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <button class="icon-btn" aria-label="Menu">☰</button>

      <div class="brand">
        <div class="brand-title">SOLVERA</div>
        <div class="brand-sub"><span class="dot"></span>ONLINE</div>
      </div>

      <button class="icon-btn" aria-label="Instellingen">⚙</button>
    </div>

    <div class="hero">
      <div class="hero-glow"></div>
      <div class="hero-avatar">
        <img
          id="heroAvatar"
          src="https://raw.githubusercontent.com/g6q76sdhbk-crypto/solvera-ui/main/solvera.PNG"
          alt="Solvera"
        />
      </div>
    </div>

    <div id="feed" class="feed" aria-live="polite"></div>

    <div class="composer">
      <div class="composer-shell">
        <div class="composer-row">
          <button class="plus-btn" id="plusBtn" aria-label="Acties">+</button>
          <div class="input-wrap">
            <input
              id="input"
              type="text"
              placeholder="Zeg iets... of gebruik /command"
              autocomplete="off"
              autocapitalize="sentences"
              autocorrect="on"
              spellcheck="true"
            />
          </div>
          <button class="mic-btn" id="micBtn" aria-label="Microfoon">🎙</button>
          <button class="send-btn" id="sendBtn" aria-label="Versturen">➤</button>
        </div>

        <div class="command-strip" id="commandStrip">
          <div class="chip"><strong>/</strong>memory</div>
          <div class="chip"><strong>/</strong>projects</div>
          <div class="chip"><strong>/</strong>analyze</div>
          <div class="chip"><strong>/</strong>code</div>
        </div>

        <div class="status-row">
          <div class="status-pulse"><span class="live"></span><span id="statusText">Solvera is ready</span></div>
          <div id="hintText">Enter = send</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://solvergpt.onrender.com";
    const API_URL = API_BASE + "/api";
    const AVATAR = "https://raw.githubusercontent.com/g6q76sdhbk-crypto/solvera-ui/main/solvera.PNG";

    const feed = document.getElementById("feed");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const micBtn = document.getElementById("micBtn");
    const plusBtn = document.getElementById("plusBtn");
    const statusText = document.getElementById("statusText");
    const heroAvatar = document.getElementById("heroAvatar");

    heroAvatar.src = AVATAR;

    let sending = false;
    let pendingAnalyzePrompt = "";

    const fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = "image/*";
    fileInput.className = "hidden";
    document.body.appendChild(fileInput);

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        feed.scrollTop = feed.scrollHeight;
      });
    }

    function setBusy(isBusy) {
      sending = isBusy;
      sendBtn.disabled = isBusy;
      input.disabled = isBusy;
      micBtn.disabled = isBusy;
      plusBtn.disabled = isBusy;
      statusText.textContent = isBusy ? "Solvera denkt..." : "Solvera is ready";
      sendBtn.style.opacity = isBusy ? "0.72" : "1";
      input.style.opacity = isBusy ? "0.82" : "1";
    }

    function createBotRow() {
      const row = document.createElement("div");
      row.className = "message-row bot";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      const avatarImg = document.createElement("img");
      avatarImg.src = AVATAR;
      avatarImg.alt = "Solvera";
      avatar.appendChild(avatarImg);

      const block = document.createElement("div");
      block.className = "assistant-block";

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = "Solvera";

      const bubble = document.createElement("div");
      bubble.className = "bubble bot";

      block.appendChild(name);
      block.appendChild(bubble);
      row.appendChild(avatar);
      row.appendChild(block);

      return { row, bubble };
    }

    function createUserRow() {
      const row = document.createElement("div");
      row.className = "message-row user";

      const bubble = document.createElement("div");
      bubble.className = "bubble user";

      row.appendChild(bubble);
      return { row, bubble };
    }

    function addUserMessage(text) {
      const { row, bubble } = createUserRow();
      bubble.textContent = text;
      feed.appendChild(row);
      scrollToBottom();
    }

    function addUserImage(dataUrl, label = "📷 afbeelding") {
      const { row, bubble } = createUserRow();
      bubble.style.padding = "10px";
      bubble.style.maxWidth = "78vw";
      bubble.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="font-size:13px;opacity:.92">${escapeHtml(label)}</div>
          <img src="${dataUrl}" alt="upload" style="width:100%;border-radius:12px;display:block" />
        </div>
      `;
      feed.appendChild(row);
      scrollToBottom();
    }

    function addBotImage(url) {
      const { row, bubble } = createBotRow();
      bubble.style.padding = "10px";
      bubble.innerHTML = `
        <img src="${url}" alt="Solvera image" style="width:100%;border-radius:12px;display:block" />
      `;
      feed.appendChild(row);
      scrollToBottom();
    }

    function addTyping() {
      const row = document.createElement("div");
      row.className = "message-row bot";
      row.id = "typingRow";

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      const avatarImg = document.createElement("img");
      avatarImg.src = AVATAR;
      avatarImg.alt = "Solvera";
      avatar.appendChild(avatarImg);

      const block = document.createElement("div");
      block.className = "assistant-block";

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = "Solvera";

      const bubble = document.createElement("div");
      bubble.className = "bubble bot";
      bubble.innerHTML = `
        <div class="typing" aria-label="Solvera typt">
          <span></span><span></span><span></span>
        </div>
      `;

      block.appendChild(name);
      block.appendChild(bubble);
      row.appendChild(avatar);
      row.appendChild(block);

      feed.appendChild(row);
      scrollToBottom();
    }

    function removeTyping() {
      const row = document.getElementById("typingRow");
      if (row) row.remove();
    }

    function revealBotText(text) {
      const { row, bubble } = createBotRow();
      bubble.textContent = "";
      feed.appendChild(row);
      scrollToBottom();

      const full = String(text ?? "");
      if (!full) {
        bubble.textContent = "";
        return;
      }

      let index = 0;
      const step = Math.max(1, Math.ceil(full.length / 120));
      const timer = setInterval(() => {
        index = Math.min(full.length, index + step);
        bubble.textContent = full.slice(0, index);
        scrollToBottom();
        if (index >= full.length) {
          clearInterval(timer);
        }
      }, 12);
    }

    function addBotText(text) {
      const { row, bubble } = createBotRow();
      bubble.textContent = text;
      feed.appendChild(row);
      scrollToBottom();
    }

    function resetStatus() {
      statusText.textContent = "Solvera is ready";
      setBusy(false);
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function analyzeImageData(dataUrl, prompt) {
      const res = await fetch(API_BASE + "/api/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          imageBase64: dataUrl,
          prompt: prompt || "Analyseer deze afbeelding"
        })
      });

      const data = await res.json();
      return data.result || data.error || "⚠️ Analyse error";
    }

    async function generateImage(prompt) {
      const res = await fetch(API_BASE + "/api/image", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt })
      });

      const data = await res.json();
      return data.url || data.error || "";
    }

    async function sendChatPrompt(prompt) {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ input: prompt })
      });

      const data = await res.json();
      return data.output || data.error || "⚠️ Geen antwoord";
    }

    async function handleSelectedImage(file, promptText) {
      if (!file || !file.type || !file.type.startsWith("image/")) {
        addBotText("⚠️ Alleen afbeeldingen werken hier.");
        return;
      }

      const dataUrl = await readFileAsDataURL(file);
      addUserImage(dataUrl);

      setBusy(true);
      addTyping();

      try {
        const result = await analyzeImageData(dataUrl, promptText || "Analyseer deze afbeelding");
        removeTyping();
        revealBotText(result);
      } catch (err) {
        removeTyping();
        addBotText("⚠️ Analyse error");
      } finally {
        resetStatus();
      }
    }

    async function send() {
      if (sending) return;

      const raw = input.value.trim();
      if (!raw) return;

      const lower = raw.toLowerCase();
      addUserMessage(raw);
      input.value = "";
      setBusy(true);
      addTyping();

      try {
        if (lower.startsWith("/image")) {
          const prompt = raw.replace(/^\/image\s*/i, "").trim();
          removeTyping();

          if (!prompt) {
            addBotText("Typ een prompt na /image.");
            resetStatus();
            return;
          }

          const url = await generateImage(prompt);
          if (url.startsWith("http") || url.startsWith("data:")) {
            addBotImage(url);
          } else {
            addBotText(url || "⚠️ Image error");
          }

          resetStatus();
          return;
        }

        if (lower.startsWith("/analyze")) {
          const prompt = raw.replace(/^\/analyze\s*/i, "").trim() || "Analyseer deze afbeelding";
          pendingAnalyzePrompt = prompt;
          removeTyping();
          setBusy(false);
          statusText.textContent = "Kies een afbeelding...";
          fileInput.click();
          return;
        }

        if (lower.startsWith("/memory")) {
          const rest = raw.replace(/^\/memory\s*/i, "").trim();
          if (!rest) {
            removeTyping();
            input.value = "onthoud dit: ";
            input.focus();
            resetStatus();
            return;
          }

          const prompt = `onthoud dit: ${rest}`;
          const output = await sendChatPrompt(prompt);
          removeTyping();
          revealBotText(output);
          resetStatus();
          return;
        }

        if (lower.startsWith("/projects")) {
          const rest = raw.replace(/^\/projects\s*/i, "").trim();
          const prompt = rest || "Welke projecten ken je van mij?";
          const output = await sendChatPrompt(prompt);
          removeTyping();
          revealBotText(output);
          resetStatus();
          return;
        }

        if (lower.startsWith("/code")) {
          const rest = raw.replace(/^\/code\s*/i, "").trim();
          if (!rest) {
            removeTyping();
            input.value = "Schrijf code voor: ";
            input.focus();
            resetStatus();
            return;
          }

          const output = await sendChatPrompt(`Geef me code voor: ${rest}`);
          removeTyping();
          revealBotText(output);
          resetStatus();
          return;
        }

        if (lower.includes("genereer") && lower.includes("afbeelding")) {
          removeTyping();
          const url = await generateImage(raw);
          if (url.startsWith("http") || url.startsWith("data:")) {
            addBotImage(url);
          } else {
            addBotText(url || "⚠️ Image error");
          }
          resetStatus();
          return;
        }

        const output = await sendChatPrompt(raw);
        removeTyping();
        revealBotText(output);
        resetStatus();
      } catch (err) {
        removeTyping();
        addBotText("⚠️ Server error");
        resetStatus();
      }
    }

    sendBtn.addEventListener("click", send);

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") send();
    });

    document.querySelectorAll(".chip").forEach((chip) => {
      chip.addEventListener("click", () => {
        const txt = chip.textContent.trim();

        if (txt.includes("/memory")) {
          input.value = "onthoud dit: ";
        } else if (txt.includes("/projects")) {
          input.value = "Welke projecten ken je van mij?";
        } else if (txt.includes("/analyze")) {
          pendingAnalyzePrompt = input.value.trim() || "Analyseer deze afbeelding";
          fileInput.click();
          return;
        } else if (txt.includes("/code")) {
          input.value = "Schrijf code voor: ";
        } else {
          input.value = txt.replace(/\s+/g, " ");
        }

        input.focus();
      });
    });

    plusBtn.addEventListener("click", () => {
      pendingAnalyzePrompt = input.value.trim() || "Analyseer deze afbeelding";
      fileInput.value = "";
      fileInput.click();
    });

    micBtn.addEventListener("click", () => {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        statusText.textContent = "Voice niet ondersteund";
        setTimeout(() => {
          if (!sending) statusText.textContent = "Solvera is ready";
        }, 1200);
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = "nl-NL";
      recognition.interimResults = true;
      recognition.continuous = false;

      statusText.textContent = "Solvera luistert...";
      recognition.onresult = (e) => {
        const transcript = Array.from(e.results)
          .map(result => result[0].transcript)
          .join(" ");
        input.value = transcript;
      };

      recognition.onerror = () => {
        statusText.textContent = "Voice mislukt";
      };

      recognition.onend = () => {
        if (!sending) statusText.textContent = "Solvera is ready";
      };

      recognition.start();
    });

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;
      await handleSelectedImage(file, pendingAnalyzePrompt || "Analyseer deze afbeelding");
      pendingAnalyzePrompt = "";
      fileInput.value = "";
    });

    document.addEventListener("paste", async (e) => {
      const items = Array.from(e.clipboardData?.items || []);
      const imageItem = items.find(item => item.type && item.type.startsWith("image/"));
      if (!imageItem) return;

      const file = imageItem.getAsFile();
      if (!file) return;

      pendingAnalyzePrompt = input.value.trim() || "Analyseer deze afbeelding";
      await handleSelectedImage(file, pendingAnalyzePrompt);
      pendingAnalyzePrompt = "";
    });

    document.addEventListener("dragover", (e) => {
      e.preventDefault();
    });

    document.addEventListener("drop", async (e) => {
      e.preventDefault();
      const files = Array.from(e.dataTransfer?.files || []);
      const imageFile = files.find(file => file.type && file.type.startsWith("image/"));
      if (!imageFile) return;

      pendingAnalyzePrompt = input.value.trim() || "Analyseer deze afbeelding";
      await handleSelectedImage(imageFile, pendingAnalyzePrompt);
      pendingAnalyzePrompt = "";
    });

    addBotText("Hoi Laurens. Hoe kan ik je vandaag helpen?");
  </script>
</body>
</html>
