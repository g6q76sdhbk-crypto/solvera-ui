<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Solvera</title>

<style>
:root{
  --bg:#05070a;
  --glass:rgba(255,255,255,0.05);
  --line:rgba(255,255,255,0.08);
  --text:rgba(255,255,255,0.95);
  --blue:#2da8ff;
  --purple:#6a5cff;
  --green:#20d46b;
}

*{box-sizing:border-box}
body{
  margin:0;
  background:
    radial-gradient(circle at 50% 20%, rgba(45,168,255,0.1), transparent),
    var(--bg);
  color:var(--text);
  font-family:-apple-system,system-ui;
  display:flex;
  height:100vh;
}

/* ===== LAYOUT ===== */

.chat{
  flex:1;
  display:flex;
  flex-direction:column;
}

.agent{
  width:380px;
  border-left:1px solid var(--line);
  display:flex;
  flex-direction:column;
  background:rgba(255,255,255,0.02);
}

/* ===== HEADER ===== */

.header{
  padding:14px;
  border-bottom:1px solid var(--line);
  text-align:center;
  letter-spacing:.3em;
  font-size:13px;
  opacity:.7;
}

/* ===== CHAT ===== */

.feed{
  flex:1;
  overflow:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.row{
  display:flex;
}

.row.user{justify-content:flex-end}
.row.bot{justify-content:flex-start}

.bubble{
  max-width:70%;
  padding:12px 14px;
  border-radius:16px;
  line-height:1.4;
}

.user .bubble{
  background:linear-gradient(135deg,var(--blue),var(--purple));
}

.bot .bubble{
  background:var(--glass);
  border:1px solid var(--line);
}

/* ===== INPUT ===== */

.bar{
  display:flex;
  gap:10px;
  padding:12px;
  border-top:1px solid var(--line);
}

textarea{
  flex:1;
  background:#111;
  border:none;
  border-radius:10px;
  padding:10px;
  color:white;
  resize:none;
  outline:none;
}

button{
  background:linear-gradient(135deg,var(--blue),var(--purple));
  border:none;
  border-radius:10px;
  padding:10px 14px;
  color:white;
  cursor:pointer;
}

/* ===== AGENT ===== */

.terminal{
  flex:1;
  overflow:auto;
  padding:12px;
  font-family:monospace;
  font-size:12px;
  color:#8affc1;
}

.preview{
  height:45%;
  border-top:1px solid var(--line);
}

iframe{
  width:100%;
  height:100%;
  border:none;
  background:white;
}

/* ===== FILES ===== */

.files{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  padding:10px;
  border-top:1px solid var(--line);
}

.file{
  background:rgba(255,255,255,0.05);
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="chat">

  <div class="header">SOLVERA</div>

  <div id="feed" class="feed"></div>

  <div class="bar">
    <textarea id="input" placeholder="Bericht..."></textarea>
    <button id="send">→</button>
  </div>

</div>

<div class="agent">

  <div class="header">AGENT</div>

  <div id="terminal" class="terminal">> idle</div>

  <div class="preview">
    <iframe id="preview"></iframe>
  </div>

  <div id="files" class="files"></div>

</div>

<script>
const API = "https://solvergpt.onrender.com";
const PASSWORD = "JOUW_PASSWORD";

const feed = document.getElementById("feed");
const input = document.getElementById("input");
const terminal = document.getElementById("terminal");
const preview = document.getElementById("preview");
const filesDiv = document.getElementById("files");

let sending = false;

/* ===== AUTH ===== */

async function login(){
  await fetch(API + "/api/auth/login",{
    method:"POST",
    credentials:"include",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ password:PASSWORD })
  });
}

/* ===== UI ===== */

function msg(text, role){
  const row = document.createElement("div");
  row.className = "row " + role;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  row.appendChild(bubble);
  feed.appendChild(row);
  feed.scrollTop = feed.scrollHeight;
}

function log(t){
  terminal.textContent += "\n> " + t;
  terminal.scrollTop = terminal.scrollHeight;
}

function clearTerminal(){
  terminal.textContent = "> ";
}

/* ===== CHAT ===== */

async function chat(text){
  const res = await fetch(API + "/api/chat",{
    method:"POST",
    credentials:"include",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ input:text })
  });

  const data = await res.json();
  return data.output;
}

/* ===== AGENT ===== */

async function agent(text){

  clearTerminal();
  log("thinking...");
  log("planning...");
  log("building...");

  const res = await fetch(API + "/api/agent",{
    method:"POST",
    credentials:"include",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ input:text })
  });

  const data = await res.json();

  log("done");

  renderFiles(data.files || []);
  renderPreview(data.files || []);

  return data.summary;
}

/* ===== FILES ===== */

function renderFiles(list){
  filesDiv.innerHTML = "";

  list.forEach(f=>{
    const btn = document.createElement("div");
    btn.className = "file";
    btn.textContent = f.name;

    btn.onclick = ()=>{
      alert(f.content.slice(0,1000));
    };

    filesDiv.appendChild(btn);
  });
}

/* ===== PREVIEW ===== */

function renderPreview(list){
  const html = list.find(f=>f.name.endsWith(".html"));
  if(html){
    preview.srcdoc = html.content;
  }
}

/* ===== SEND ===== */

async function send(){

  if(sending) return;

  const text = input.value.trim();
  if(!text) return;

  sending = true;

  msg(text,"user");
  input.value = "";

  let out;

  if(
    text.includes("build") ||
    text.includes("maak") ||
    text.includes("website") ||
    text.includes("app")
  ){
    out = await agent(text);
  }else{
    out = await chat(text);
  }

  msg(out,"bot");

  sending = false;
}

/* ===== EVENTS ===== */

document.getElementById("send").onclick = send;

input.addEventListener("keydown", e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});

/* ===== INIT ===== */

(async()=>{
  await login();
  msg("Solvera online.","bot");
})();
</script>

</body>
</html>
